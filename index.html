<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pico Pro Engine</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/v4F0RRKS/IMG-4539.jpg">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .sc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        
        /* Экран входа */
        #nick-sc { display: flex; background: #000; }
        .n-box { background: #111; padding: 30px; border-radius: 20px; border: 2px solid #0055ff; width: 85%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 15px; border-radius: 10px; border: none; font-size: 20px; text-align: center; background: #222; color: #fff; width: 100%; }
        .btn-green { padding: 15px; background: #0f0; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; color: #000; cursor: pointer; }

        /* Меню */
        #menu-sc { background: #000; }
        .bg { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: -1; opacity: 0.6; }
        .top-bar { position: absolute; top: 10px; width: 95%; display: flex; justify-content: space-between; align-items: center; }
        .stat-card { background: rgba(40,40,40,0.9); padding: 8px 12px; border-radius: 10px; border: 1px solid #555; font-size: 14px; }
        .side-btns { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; }
        .sq-btn { width: 70px; height: 70px; background: #333; border: 2px solid #555; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center; cursor: pointer; }
        .play-btn { position: absolute; bottom: 30px; width: 90%; background: #ffea00; color: #000; padding: 18px; border-radius: 40px; border: 4px solid #fff; font-weight: bold; font-size: 24px; text-align: center; cursor: pointer; }

        /* Магазин */
        .mdl { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 3px solid #0055ff; width: 90%; height: 70%; border-radius: 25px; padding: 20px; display: none; z-index: 100; }

        /* Игра */
        #game-sc { background: #151515; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        .hp-bar { width: 120px; height: 12px; background: #333; border: 2px solid #fff; border-radius: 10px; margin: 0 auto; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #0f0; transition: 0.3s; }
        .j { position: absolute; bottom: 50px; width: 90px; height: 90px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid; }
        #j-l { left: 30px; border-color: #0055ff; }
        #j-r { right: 30px; border-color: #f00; }
        .st { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; }
    </style>
</head>
<body>

    <div id="nick-sc" class="sc">
        <div class="n-box">
            <h2 style="text-align:center; margin:0">pico id</h2>
            <input type="text" id="nick-in" placeholder="Никнейм" maxlength="12">
            <button class="btn-green" onclick="saveNick()">ВХОД</button>
        </div>
    </div>

    <div id="menu-sc" class="sc">
        <img src="https://i.ibb.co/DJsfqdJ/IMG-1949.jpg" class="bg">
        <div class="top-bar">
            <div class="stat-card" id="disp-nick">pico</div>
            <div style="display:flex; gap:8px">
                <div class="stat-card">🟡 <span id="c-count">100</span></div>
                <div class="stat-card">💎 <span id="g-count">20</span></div>
            </div>
        </div>
        <div class="side-btns">
            <div class="sq-btn" onclick="openShop()">МАГАЗИН</div>
        </div>
        <div style="font-size:70px; text-align:center; margin-top:30px">😀<br>🚹<br>🦵🏾🦵🏾</div>
        <div class="play-btn" onclick="startBattle()">ИГРАТЬ</div>
    </div>

    <div id="shop-mdl" class="mdl">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
            <h2 style="color:gold; margin:0">SHOP</h2>
            <button onclick="closeShop()" style="background:#f33; border:none; color:#fff; padding:5px 15px; border-radius:8px">X</button>
        </div>
        <p>Введите промокод:</p>
        <input type="text" id="promo-in" placeholder="КОД">
        <button class="btn-green" style="width:100%; margin-top:10px" onclick="usePromo()">ОК</button>
    </div>

    <div id="game-sc" class="sc">
        <div class="hud">
            <div class="hp-bar"><div id="hp-fill"></div></div>
            <div id="ammo-txt" style="margin-top:5px; font-weight:bold; text-shadow: 1px 1px 2px #000">3 / 3</div>
        </div>
        <canvas id="stage"></canvas>
        <div id="j-l" class="j"><div id="s-l" class="st"></div></div>
        <div id="j-r" class="j"><div id="s-r" class="st"></div></div>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
// Конфиг Firebase
const firebaseConfig = {
    apiKey: "AIzaSyAqVnAGWpLJKWYoyMoqdyVg22Ks4U2Bq-0",
    projectId: "pico-server-pro",
    databaseURL: "https://pico-server-pro-default-rtdb.firebaseio.com",
    appId: "1:1066461989698:ios:58db1a5166b9c6dd9416db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, playing = false;
let coins = 100, gems = 20;
let ammo = 3, lastReload = Date.now();
let plr = { x: 0, y: 0, hp: 100, nick: "pico", r: 20, speed: 5 };
let bullets = [], walls = [], ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};

// ФУНКЦИЯ ВХОДА (ИСПРАВЛЕНА)
function saveNick() {
    const val = document.getElementById('nick-in').value.trim();
    if (!val) {
        alert("Введи ник!");
        return;
    }
    localStorage.setItem('pico_nick', val);
    
    // Отправка в Firebase
    db.ref('users/' + val).update({ 
        online: true, 
        last: Date.now() 
    });

    showMenu(val);
}

function showMenu(name) {
    plr.nick = name;
    document.getElementById('disp-nick').innerText = name;
    
    // Скрываем вход, показываем меню
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
}

// Проверка при загрузке
window.onload = () => {
    const saved = localStorage.getItem('pico_nick');
    if(saved) showMenu(saved);
}

// МАГАЗИН
function openShop() { document.getElementById('shop-mdl').style.display = 'block'; }
function closeShop() { document.getElementById('shop-mdl').style.display = 'none'; }
function usePromo() {
    if(document.getElementById('promo-in').value.toUpperCase() === 'PICO2026') {
        coins += 500; 
        document.getElementById('c-count').innerText = coins;
        alert("Бонус +500 монет!");
    } else { 
        alert("Неверный код"); 
    }
}

// ИГРОВАЯ ЛОГИКА
function startBattle() {
    playing = true;
    document.getElementById('menu-sc').style.display = 'none';
    document.getElementById('game-sc').style.display = 'flex';
    resize();
    plr.x = w/2; plr.y = h/2; plr.hp = 100;
    walls = [
        {x: w*0.2, y: h*0.2, w: 100, h: 20},
        {x: w*0.7, y: h*0.6, w: 20, h: 120},
        {x: w*0.4, y: h*0.4, w: 60, h: 60}
    ];
}

function loop() {
    if(playing) {
        ctx.fillStyle = "#151515"; ctx.fillRect(0,0,w,h);
        
        if(ammo < 3 && Date.now() - lastReload > 2000) {
            ammo++; lastReload = Date.now();
            document.getElementById('ammo-txt').innerText = ammo + " / 3";
        }

        ctx.fillStyle = "#444";
        walls.forEach(wl => ctx.fillRect(wl.x, wl.y, wl.w, wl.h));

        if(ml.a) {
            let nx = plr.x + ml.x * plr.speed;
            let ny = plr.y + ml.y * plr.speed;
            let hit = walls.some(wl => nx+plr.r > wl.x && nx-plr.r < wl.x+wl.w && ny+plr.r > wl.y && ny-plr.r < wl.y+wl.h);
            if(!hit) { plr.x = nx; plr.y = ny; }
        }

        bullets.forEach((b, i) => {
            b.x += Math.cos(b.a)*12; b.y += Math.sin(b.a)*12;
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill();
            if(b.x<0 || b.x>w || b.y<0 || b.y>h) bullets.splice(i, 1);
        });

        ctx.fillStyle = "#0f0"; ctx.beginPath(); ctx.arc(plr.x, plr.y, plr.r, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "14px Arial"; ctx.textAlign = "center";
        ctx.fillText(plr.nick, plr.x, plr.y - 30);
    }
    requestAnimationFrame(loop);
}

function fire() {
    if(ammo > 0) {
        bullets.push({x: plr.x, y: plr.y, a: mr.ang});
        ammo--; lastReload = Date.now();
        document.getElementById('ammo-txt').innerText = ammo + " / 3";
    }
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize; resize(); loop();

function handle(e, j, zId, sId, shoot) {
    const z = document.getElementById(zId).getBoundingClientRect();
    const s = document.getElementById(sId);
    const touches = e.touches || [];
    const t = Array.from(touches).find(t => t.clientX > z.left-20 && t.clientX < z.right+20);
    if(t) {
        j.a = 1; let dx = t.clientX - (z.left+45), dy = t.clientY - (z.top+45);
        let d = Math.min(Math.hypot(dx,dy), 40); j.ang = Math.atan2(dy, dx);
        if(!shoot) { j.x = Math.cos(j.ang)*(d/40); j.y = Math.sin(j.ang)*(d/40); }
        s.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*d}px), calc(-50% + ${Math.sin(j.ang)*d}px))`;
    }
}

window.addEventListener('touchstart', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchmove', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchend', e => { if(e.touches.length === 0) { if(mr.a) fire(); ml.a = 0; mr.a = 0; } });
</script>
</body>
</html>
