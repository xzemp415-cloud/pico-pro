<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pico Pro Engine</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/v4F0RRKS/IMG-4539.jpg">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .sc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #nick-sc { display: flex; background: #000; }
        #menu-sc { background: #000; }
        #match-sc { display: none; background: linear-gradient(180deg, #a430ff 0%, #4a00e0 100%); text-align: center; z-index: 50; }
        .m-sun { width: 200px; height: 200px; background: #ffea00; border-radius: 50%; filter: blur(15px); position: absolute; top: 15%; z-index: -1; opacity: 0.8; }
        .n-box { background: #111; padding: 30px; border-radius: 20px; border: 2px solid #0055ff; width: 85%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 15px; border-radius: 10px; border: none; font-size: 20px; text-align: center; background: #222; color: #fff; width: 100%; }
        .btn { padding: 15px; background: #0f0; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; color: #000; }
        .play-btn { position: absolute; bottom: 30px; width: 90%; background: #ffea00; color: #000; padding: 20px; border-radius: 40px; border: 4px solid #fff; font-weight: bold; font-size: 24px; text-align: center; }
        #game-sc { background: #151515; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        .hp-bar { width: 140px; height: 14px; background: #333; border: 2px solid #fff; border-radius: 7px; margin: 0 auto; overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #0f0; }
        .j { position: absolute; bottom: 50px; width: 90px; height: 90px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid; }
        #j-l { left: 30px; border-color: #0055ff; }
        #j-r { right: 30px; border-color: #f00; }
        .st { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="nick-sc" class="sc">
        <div class="n-box">
            <h2>pico id</h2>
            <input type="text" id="nick-in" placeholder="Никнейм">
            <button class="btn" onclick="saveNick()">ВХОД</button>
        </div>
    </div>

    <div id="menu-sc" class="sc">
        <div class="top-bar" style="position:absolute; top:20px; width:90%; display:flex; justify-content:space-between">
            <span id="disp-nick">...</span>
            <span>🟡 <span id="c-count">100</span></span>
        </div>
        <div style="font-size:80px">😀<br>🚹</div>
        <div class="play-btn" onclick="startMatch()">ИГРАТЬ</div>
    </div>

    <div id="match-sc" class="sc">
        <div class="m-sun"></div>
        <h1 style="margin-top:100px">ПОДБОР ИГРОКОВ</h1>
        <div style="font-size:60px; font-weight:bold"><span id="p-count">0</span> / 10</div>
        <button class="btn" style="margin-top:50px; background:#f33" onclick="stopMatch()">ОТМЕНА</button>
    </div>

    <div id="game-sc" class="sc">
        <div class="hud">
            <div class="hp-bar"><div id="hp-fill"></div></div>
            <div id="ammo-txt">3 / 3</div>
        </div>
        <canvas id="stage"></canvas>
        <div id="j-l" class="j"><div id="s-l" class="st"></div></div>
        <div id="j-r" class="j"><div id="s-r" class="st"></div></div>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAqVnAGWpLJKWYoyMoqdyVg22Ks4U2Bq-0",
    projectId: "pico-server-pro",
    databaseURL: "https://pico-server-pro-default-rtdb.firebaseio.com",
    appId: "1:1066461989698:ios:58db1a5166b9c6dd9416db"
[span_2](start_span)};[span_2](end_span)

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, playing = false, ammo = 3, lastReload = Date.now();
let plr = { x: 0, y: 0, hp: 100, nick: "pico", r: 20 };
let others = {}, bullets = [], boxes = [], ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};

function saveNick() {
    const n = document.getElementById('nick-in').value || "pico" + Math.floor(Math.random()*99);
    localStorage.setItem('pico_nick', n);
    location.reload();
}

const myNick = localStorage.getItem('pico_nick');
if(myNick) {
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
    document.getElementById('disp-nick').innerText = myNick;
}

function startMatch() {
    document.getElementById('menu-sc').style.display = 'none';
    document.getElementById('match-sc').style.display = 'flex';
    db.ref('queue/' + myNick).set(true);
    db.ref('queue').on('value', s => {
        const count = s.numChildren();
        document.getElementById('p-count').innerText = count;
        if(count >= 10) {
            db.ref('queue').off();
            db.ref('queue/' + myNick).remove();
            goBattle();
        }
    });
}

function stopMatch() {
    db.ref('queue/' + myNick).remove();
    location.reload();
}

function goBattle() {
    playing = true;
    document.getElementById('match-sc').style.display = 'none';
    document.getElementById('game-sc').style.display = 'flex';
    resize();
    plr.x = Math.random()*w; plr.y = Math.random()*h;
    for(let i=0; i<5; i++) boxes.push({x: Math.random()*(w-50), y: Math.random()*(h-50), s: 40});
    
    db.ref('players/' + myNick).on('value', () => {}); // Просто держим связь
    db.ref('players').on('value', s => { others = s.val() || {}; });
    loop();
}

function loop() {
    if(!playing) return;
    ctx.clearRect(0,0,w,h);
    
    // Перезарядка
    if(ammo < 3 && Date.now() - lastReload > 2000) { ammo++; lastReload = Date.now(); document.getElementById('ammo-txt').innerText = ammo + " / 3"; }

    // Движение и синхронизация
    if(ml.a) { plr.x += ml.x*5; plr.y += ml.y*5; db.ref('players/' + myNick).set({x: plr.x, y: plr.y}); }

    // Боксы
    ctx.fillStyle = "orange";
    boxes.forEach((b, i) => {
        ctx.fillRect(b.x, b.y, b.s, b.s);
        bullets.forEach((bul, bi) => {
            if(bul.x > b.x && bul.x < b.x+b.s && bul.y > b.y && bul.y < b.y+b.s) {
                boxes.splice(i, 1); bullets.splice(bi, 1);
                plr.hp = Math.min(100, plr.hp + 20);
                document.getElementById('hp-fill').style.width = plr.hp + "%";
            }
        });
    });

    // Пули
    ctx.fillStyle = "yellow";
    bullets.forEach((b, i) => {
        b.x += Math.cos(b.a)*10; b.y += Math.sin(b.a)*10;
        ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill();
        if(b.x<0 || b.x>w || b.y<0 || b.y>h) bullets.splice(i, 1);
    });

    // Отрисовка игроков
    for(let id in others) {
        ctx.fillStyle = id === myNick ? "#0f0" : "#f00";
        ctx.beginPath(); ctx.arc(others[id].x, others[id].y, 20, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillText(id, others[id].x - 10, others[id].y - 30);
    }

    requestAnimationFrame(loop);
}

function fire() {
    if(ammo > 0) { bullets.push({x: plr.x, y: plr.y, a: mr.ang}); ammo--; lastReload = Date.now(); document.getElementById('ammo-txt').innerText = ammo + " / 3"; }
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize;

function handle(e, j, zId, sId, shoot) {
    const z = document.getElementById(zId).getBoundingClientRect();
    const s = document.getElementById(sId);
    const touches = e.touches || [];
    const t = Array.from(touches).find(t => t.clientX > z.left-20 && t.clientX < z.right+20);
    if(t) {
        j.a = 1; let dx = t.clientX - (z.left+45), dy = t.clientY - (z.top+45);
        let d = Math.min(Math.hypot(dx,dy), 40); j.ang = Math.atan2(dy, dx);
        if(!shoot) { j.x = Math.cos(j.ang)*(d/40); j.y = Math.sin(j.ang)*(d/40); }
        s.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*d}px), calc(-50% + ${Math.sin(j.ang)*d}px))`;
    }
}
window.addEventListener('touchstart', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchmove', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchend', e => { if(e.touches.length === 0) { if(mr.a) fire(); ml.a = 0; mr.a = 0; } });
</script>
</body>
</html>
