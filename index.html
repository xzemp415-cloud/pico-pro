<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>boottle flip!</title>
    <meta name="theme-color" content="#ffd700">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/jvBPTLXp/IMG-4177.jpg">

    <style>
        /* общие стили */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: white;
        }

        .screen {
            display: none;
            width: 100vw;
            height: 100vh;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* экран загрузки */
        #loading-screen {
            background-image: url('https://i.ibb.co/jvBPTLXp/IMG-4177.jpg');
        }

        .loader-container {
            position: absolute;
            bottom: 50px;
            width: 80%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            border: 2px solid #ffd700;
        }

        #loader-bar {
            width: 0%;
            height: 100%;
            background: #ffd700;
            box-shadow: 0 0 15px #ffd700;
            border-radius: 8px;
            transition: width 0.1s linear;
        }

        /* экран выбора никнейма */
        #nickname-screen {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        .nickname-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #ffd700;
            text-align: center;
        }

        input {
            padding: 10px;
            font-size: 1.2rem;
            border-radius: 5px;
            border: none;
            margin-bottom: 20px;
            width: 200px;
        }

        /* главное меню */
        #menu-screen {
            background-image: url('https://i.ibb.co/844Cn9dP/IMG-4684.jpg');
        }

        .account-info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .play-button {
            position: absolute;
            bottom: 10%;
            padding: 15px 60px;
            font-size: 2.5rem;
            font-family: "Arial Black", Gadget, sans-serif; /* имитация футуристичного шрифта */
            background: transparent;
            color: #fff;
            border: 4px solid #fffb00;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            box-shadow: 0 0 10px #fffb00, inset 0 0 10px #fffb00;
            text-shadow: 0 0 10px #fffb00;
            transition: 0.3s;
        }

        .play-button:hover {
            transform: scale(1.1);
            background: #fffb00;
            color: #000;
        }
    </style>
</head>
<body>

    <div id="loading-screen" class="screen active">
        <div class="loader-container">
            <div id="loader-bar"></div>
        </div>
    </div>

    <div id="nickname-screen" class="screen">
        <div class="nickname-box">
            <h2>введи свой ник, чемпион 2026 🏆</h2>
            <input type="text" id="nickname-input" placeholder="твой ник...">
            <br>
            <button class="play-button" style="position: static; font-size: 1.2rem;" onclick="saveNickname()">сохранить</button>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="account-info" id="display-name">игрок: ...</div>
        <button class="play-button">играть</button>
    </div>

    <script>
        // регистрация service worker для pwa
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('sw error:', err));
        }

        // логика загрузки (10 секунд)
        const loaderBar = document.getElementById('loader-bar');
        const loadingScreen = document.getElementById('loading-screen');
        const nicknameScreen = document.getElementById('nickname-screen');
        const menuScreen = document.getElementById('menu-screen');
        const displayName = document.getElementById('display-name');

        let progress = 0;
        const interval = setInterval(() => {
            progress += 1;
            loaderBar.style.width = progress + '%';

            if (progress >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    loadingScreen.classList.remove('active');
                    nicknameScreen.classList.add('active');
                }, 500);
            }
        }, 100); 

        // сохранение ника и переход в меню
        function saveNickname() {
            const input = document.getElementById('nickname-input').value;
            if (input.trim() !== "") {
                displayName.innerText = "аккаунт: " + input;
                nicknameScreen.classList.remove('active');
                menuScreen.classList.add('active');
            } else {
                alert("пожалуйста, введи имя! ✨");
            }
        }
    </script>
</body>
</html>
