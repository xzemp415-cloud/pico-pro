<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bottle Flip 2026</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffd700">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/bMSVRPFZ/copy-BBBD0921-96-CE-4824-ACE6-CB12-D74-A224-B.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        /* Полная блокировка интерфейса браузера */
        * { 
            -webkit-tap-highlight-color: transparent; 
            user-select: none; 
            touch-action: none; 
            -webkit-user-drag: none;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; color: white; 
            font-family: 'Orbitron', sans-serif; position: fixed;
        }
        
        .screen { 
            display: none; width: 100vw; height: 100vh; 
            position: absolute; top: 0; left: 0; 
            background-size: cover; background-position: center; 
            flex-direction: column; align-items: center; justify-content: center; 
        }

        .active { display: flex !important; }

        /* Загрузка */
        #loading-screen { background-image: url('https://i.ibb.co/jvBPTLXp/IMG-4177.jpg'); z-index: 100; }
        .loader-container { 
            position: absolute; bottom: 10%; width: 80%; height: 10px; 
            background: rgba(255,255,255,0.1); border: 2px solid #ffd700; 
            border-radius: 10px; overflow: hidden; 
        }
        #loader-bar { 
            width: 0%; height: 100%; background: #ffd700; 
            box-shadow: 0 0 15px #ffd700;
            animation: moveProgress 10s linear forwards; 
        }
        @keyframes moveProgress { from { width: 0%; } to { width: 100%; } }

        /* Ник */
        #nickname-screen { background: #000; z-index: 90; }
        .nick-box { text-align:center; background:#111; padding:30px; border:3px solid #ffd700; border-radius:20px; box-shadow: 0 0 20px #ffd700; }
        input { padding: 12px; font-size: 1.2rem; border-radius: 10px; border: none; text-align: center; margin-bottom: 20px; outline: none; }

        /* Меню */
        #menu-screen { background-image: url('https://i.ibb.co/844Cn9dP/IMG-4684.jpg'); z-index: 80; }
        .account-info { position: absolute; top: 60px; left: 20px; font-size: 1.2rem; text-shadow: 2px 2px 5px #000; }
        .play-button { 
            position: absolute; bottom: 15%; padding: 15px 60px; font-size: 2.2rem; 
            background: rgba(0,0,0,0.7); color: #fff; border: 4px solid #fffb00; 
            border-radius: 50px; cursor: pointer; box-shadow: 0 0 25px #fffb00; 
            font-family: 'Orbitron', sans-serif;
        }

        /* Игра */
        #game-screen { background: #000; z-index: 70; }
        #counter { position: absolute; top: 50px; right: 30px; color: #00ff00; font-size: 3rem; z-index: 10; text-shadow: 0 0 10px #00ff00; }
        #game-img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        /* Взрыв */
        #boom { 
            display: none; position: absolute; font-size: 10rem; 
            z-index: 20; pointer-events: none;
            animation: blast 0.5s ease-out forwards; 
        }
        @keyframes blast { 
            0% { transform: scale(0.5); opacity: 0; } 
            50% { opacity: 1; } 
            100% { transform: scale(2.5); opacity: 0; } 
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-screen" class="screen active">
        <div class="loader-container"><div id="loader-bar"></div></div>
    </div>

    <div id="nickname-screen" class="screen">
        <div class="nick-box">
            <h2 style="color:#ffd700">ТВОЙ НИК</h2>
            <input type="text" id="nickname-input" placeholder="Введите...">
            <br>
            <button class="play-button" style="position:static; font-size:1.5rem;" onclick="saveNick()">OK</button>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="account-info" id="display-name">ACC: ...</div>
        <button class="play-button" onclick="startGame()">ИГРАТЬ</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="counter">0/5</div>
        <div id="boom">💥</div>
        <img id="game-img" src="https://i.ibb.co/nsvmZN7s/IMG-4687.jpg">
    </div>

    <script>
        let startTime, startY, isBroken = false;

        // Блокировка скролла (iOS/Android)
        document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

        window.onload = () => {
            setTimeout(() => {
                const savedNick = localStorage.getItem('bottle_nick');
                document.getElementById('loading-screen').classList.remove('active');
                if (savedNick) showMenu(savedNick);
                else document.getElementById('nickname-screen').classList.add('active');
            }, 10000);
        };

        function saveNick() {
            const nick = document.getElementById('nickname-input').value.trim();
            if (nick) { 
                localStorage.setItem('bottle_nick', nick); 
                showMenu(nick); 
            }
        }

        function showMenu(nick) {
            document.getElementById('display-name').innerText = "ACC: " + nick;
            document.getElementById('nickname-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }

        function startGame() {
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            isBroken = false;
            document.getElementById('game-img').src = "https://i.ibb.co/nsvmZN7s/IMG-4687.jpg";
        }

        const gameZone = document.getElementById('game-screen');
        
        gameZone.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
            startTime = Date.now();
        });

        gameZone.addEventListener('touchend', e => {
            let endY = e.changedTouches[0].clientY;
            let duration = Date.now() - startTime;
            let distance = startY - endY;

            if (distance > 60) { // Свайп должен быть ощутимым
                if (duration > 700) {
                    triggerBoom(); // Медленно
                } else {
                    triggerFail(); // Быстро
                }
            }
        });

        function triggerBoom() {
            const boom = document.getElementById('boom');
            const img = document.getElementById('game-img');
            
            boom.style.display = 'block';
            setTimeout(() => { boom.style.display = 'none'; }, 500);

            if (!isBroken) {
                img.src = "https://i.ibb.co/wFzjhB0m/image.jpg"; 
                isBroken = true;
            } else {
                img.src = "https://i.ibb.co/nsvmZN7s/IMG-4687.jpg"; 
                isBroken = false;
            }
        }

        function triggerFail() {
            const img = document.getElementById('game-img');
            img.src = "https://i.ibb.co/rBLp9Yg/image.jpg"; 
            
            setTimeout(() => {
                alert("Вы проиграли!");
                document.getElementById('game-screen').classList.remove('active');
                document.getElementById('menu-screen').classList.add('active');
            }, 150);
        }
    </script>
</body>
</html>
