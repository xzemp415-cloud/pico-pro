<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>pico engine: neon redesign</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/v4F0RRKS/IMG-4539.jpg">
    <link rel="manifest" href='data:application/manifest+json,{"name":"PicoEngine","display":"standalone","orientation":"portrait","icons":[{"src":"https://i.ibb.co/v4F0RRKS/IMG-4539.jpg","sizes":"512x512","type":"image/jpeg"}]}'>

    <style>
        :root {
            --neon: #ff00de;
            --cyan: #00f2ff;
            --bg: #050505;
            --btn-grey: #1a1a1a;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; touch-action: none; 
            background: #000; color: #fff; font-family: 'Consolas', 'Courier New', monospace;
            -webkit-user-select: none; user-select: none;
        }

        /* фиксация верхней панели */
        .top-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: 10px; background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px); border-bottom: 1px solid var(--cyan);
            display: flex; justify-content: space-between; align-items: center;
            padding-left: 15px; padding-right: 15px; z-index: 100;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .sc { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; z-index: 10; }
        
        /* фоновая картинка без растягивания */
        .bg-img { 
            width: 100%; height: 100%; object-fit: cover; 
            position: absolute; z-index: -1; opacity: 0.35; filter: saturate(1.2); 
        }

        /* игровые элементы */
        canvas { display: block; width: 100vw; height: 100vh; object-fit: contain; }
        
        .game-hud {
            position: absolute; top: calc(env(safe-area-inset-top, 20px) + 70px);
            width: 100%; text-align: center; pointer-events: none; z-index: 20;
        }

        .p-card { font-weight: bold; color: var(--cyan); text-shadow: 0 0 5px var(--cyan); text-transform: lowercase; }
        .stats-row { display: flex; gap: 8px; }
        .s-box { background: rgba(0,0,0,0.6); border: 1px solid #333; padding: 3px 7px; border-radius: 5px; font-size: 12px; }

        /* --- главное меню (редизайн) --- */
        .menu-content {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; /* центрирование скина */
        }

        /* персонаж по центру */
        .main-char-center {
            font-size: 85px; line-height: 1.1; text-align: center;
            filter: drop-shadow(0 0 15px var(--cyan));
            margin-top: 50px; /* компенсация top-bar */
        }

        /* кнопки слева */
        .left-btn-stack {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 20px; z-index: 20;
        }

        /* анимированная радужная неоновая обводка */
        @keyframes rainbow-glow {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            16% { border-color: #ff7f00; box-shadow: 0 0 10px #ff7f00; }
            33% { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
            50% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            83% { border-color: #4b0082; box-shadow: 0 0 10px #4b0082; }
            100% { border-color: #9400d3; box-shadow: 0 0 10px #9400d3; }
        }

        .sq-neon-btn {
            width: 70px; height: 70px; 
            background: var(--btn-grey); 
            border: 3px solid; /* цвет управляется анимацией */
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: #fff; text-transform: lowercase;
            text-align: center;
            animation: rainbow-glow 4s linear infinite;
            cursor: pointer;
        }

        /* кнопка "в бой" внизу */
        .play-trigger-bottom {
            position: absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 20px);
            width: 85%; background: var(--cyan); color: #000;
            padding: 18px; border-radius: 40px; font-size: 22px; font-weight: 900;
            text-align: center; box-shadow: 0 0 20px var(--cyan);
            text-transform: lowercase; z-index: 20;
        }

        /* модальные окна */
        .mdl { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(10, 10, 10, 0.95); border: 2px solid var(--neon); width: 85%; 
            border-radius: 20px; padding: 20px; display: none; z-index: 200; 
            box-shadow: 0 0 30px var(--neon); backdrop-filter: blur(5px);
        }

        .act-row { 
            border: 1px solid #333; padding: 10px; margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-radius: 10px; background: #111; 
        }
        .btn-buy-neon { background: #0f0; border: none; padding: 6px 10px; border-radius: 5px; color: #000; font-weight: bold; font-size: 11px; }
        .btn-close-neon { width: 100%; padding: 10px; border-radius: 10px; background: var(--neon); border: none; color: #fff; font-weight: bold; margin-top: 15px; }
        .neon-title { color: var(--neon); text-shadow: 0 0 8px var(--neon); text-align: center; margin-bottom: 12px; text-transform: lowercase; }

        /* геймплей */
        .hp-bar-wrap { width: 130px; height: 10px; background: #222; border-radius: 5px; border: 1px solid #fff; margin: 8px auto; overflow: hidden; }
        #hp-fill { height: 100%; width: 100%; background: #f00; transition: 0.2s; }

        .joystick-base { position: absolute; bottom: 50px; width: 85px; height: 85px; background: rgba(255,255,255,0.03); border: 2px solid; border-radius: 50%; z-index: 50; }
        #joy-l-move { left: 25px; border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        #joy-r-aim { right: 25px; border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }
        .stick-head { position: absolute; top: 50%; left: 50%; width: 38px; height: 38px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.9; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ui-top-bar" class="top-bar" style="display:none">
        <div class="p-card" id="disp-nickname">pico</div>
        <div class="stats-row">
            <div class="s-box">🟡 <span id="stat-coins">0</span></div>
            <div class="s-box">💎 <span id="stat-gems">0</span></div>
            <div class="s-box">🍿 <span id="stat-popcorn">0</span></div>
        </div>
    </div>

    <div id="nick-screen" class="sc" style="display:flex; justify-content: center; background: #000;">
        <div style="text-align:center">
            <h1 style="color:var(--cyan); text-shadow: 0 0 10px var(--cyan); text-transform: lowercase;">pico engine pro</h1>
            <input type="text" id="nick-input" placeholder="nickname" style="padding:12px; border-radius:8px; border:1px solid #333; width:80%; text-align:center; font-size:18px; margin-bottom:15px; background:#111; color:#fff;">
            <br>
            <button onclick="saveProfile()" style="padding:12px 30px; background:var(--cyan); border:none; color:#000; font-weight:bold; border-radius:8px; text-transform: lowercase;">initialize</button>
        </div>
    </div>

    <div id="menu-screen" class="sc">
        <img src="https://i.ibb.co/DJsfqdJ/IMG-1949.jpg" class="bg-img">
        
        <div class="menu-content">
            <div class="left-btn-stack">
                <div class="sq-neon-btn" onclick="openMod('shop-modal')">маркет</div>
                <div class="sq-neon-btn" onclick="openMod('skin-modal')">скины</div>
            </div>

            <div class="main-char-center" id="current-skin-display">😀<br>🚹<br>🦵🏾🦵🏾</div>

            <div class="play-trigger-bottom" onclick="startBattle()">в бой</div>
        </div>
    </div>

    <div id="game-screen" class="sc">
        <div class="game-hud">
            <div class="hp-bar-wrap"><div id="hp-fill"></div></div>
            <div id="ammo-count" style="color:var(--cyan); font-weight:bold; font-size:12px;">3 / 3</div>
        </div>
        <canvas id="game-canvas"></canvas>
        <div id="joy-l-move" class="joystick-base"><div id="stick-head-l" class="stick-head"></div></div>
        <div id="joy-r-aim" class="joystick-base"><div id="stick-head-r" class="stick-head"></div></div>
    </div>

    <div id="shop-modal" class="mdl">
        <h3 class="neon-title">маркет</h3>
        <div class="act-row">
            <span>буст +50🍿 (23ч)</span>
            <button class="btn-buy-neon" id="daily-btn" onclick="claimDailyReward()">взять</button>
        </div>
        <div class="act-row"><span>+100🟡 (50💎)</span><button class="btn-buy-neon" onclick="buyCurrency(100,'c',50,'g')">обмен</button></div>
        <button class="btn-close-neon" onclick="closeMod()">закрыть</button>
    </div>

    <div id="skin-modal" class="mdl">
        <h3 class="neon-title">нейро-сеть</h3>
        <div class="act-row"><span>classic</span><button class="btn-buy-neon" onclick="applySkin('😀','🚹','🦵🏾🦵🏾')">set</button></div>
        <div class="act-row"><span>demon</span><button class="btn-buy-neon" onclick="applySkin('😈','🥋','🔥')" style="background:var(--neon); color:#fff;">set</button></div>
        <div class="act-row"><span>robot</span><button class="btn-buy-neon" onclick="applySkin('🤖','🦾','⚙️')" style="background:var(--cyan); color:#000;">set</button></div>
        <button class="btn-close-neon" onclick="closeMod()">закрыть</button>
    </div>

<script>
// инициализация движка
const canvas = document.getElementById('game-canvas'), ctx = canvas.getContext('2d');
let w, h, playing = 0, ammo = 3, coins = 100, gems = 20, popcorn = 0;
let plr = {x:0, y:0, speed: 6, hp: 100};
let bots = [], bullets = [];
let ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};

// фильтр слов (протокол сохранности)
const forbidden = ["смерть", "умри", "кровь"];
function checkWords(text) {
    if (forbidden.some(word => text.toLowerCase().includes(word))) {
        playing = 0;
        document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#000;color:red;font-size:24px;">такое слово запрещено ⛔️</div>';
        return true;
    }
    return false;
}

// блокировка системного скролла (для pwa)
document.addEventListener('touchmove', function(e) {
    if (!e.target.closest('.mdl') && !e.target.closest('input')) e.preventDefault();
}, { passive: false });

// работа со стэком данных
function saveStats() {
    localStorage.setItem('pico_coins', coins);
    localStorage.setItem('pico_gems', gems);
    localStorage.setItem('pico_popcorn', popcorn);
    localStorage.setItem('pico_skin', document.getElementById('current-skin-display').innerHTML);
    updateUI();
}

function loadStats() {
    coins = parseInt(localStorage.getItem('pico_coins')) || 100;
    gems = parseInt(localStorage.getItem('pico_gems')) || 20;
    popcorn = parseInt(localStorage.getItem('pico_popcorn')) || 0;
    const s = localStorage.getItem('pico_skin');
    if(s) document.getElementById('current-skin-display').innerHTML = s;
    updateUI();
}

function updateUI() {
    document.getElementById('stat-coins').innerText = coins;
    document.getElementById('stat-gems').innerText = gems;
    document.getElementById('stat-popcorn').innerText = popcorn;
    document.getElementById('ammo-count').innerText = `${ammo} / 3`;
}

// адаптация экрана
function resize() { 
    w = canvas.width = window.innerWidth; 
    h = canvas.height = window.innerHeight; 
}
window.onresize = resize; resize();

// инициализация профиля
function saveProfile() {
    const n = document.getElementById('nick-input').value || "pico";
    if(checkWords(n)) return; // проверка ника
    localStorage.setItem('pico_nick', n);
    document.getElementById('disp-nickname').innerText = n;
    document.getElementById('nick-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'flex';
    document.getElementById('ui-top-bar').style.display = 'flex';
    loadStats();
}

// запуск боевого протокола
function startBattle() {
    bots = []; bullets = [];
    // баланс: 5 ботов, 10 хп (смерть с 1-2 пуль)
    for(let i=0; i<5; i++) bots.push({x: Math.random()*w, y: Math.random()*h, hp: 10});
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    plr.x = w/2; plr.y = h/2; plr.hp = 100; playing = 1;
}

// логика буста (протокол 23 часа)
function claimDailyReward() {
    const last = localStorage.getItem('pico_last_pop');
    const now = Date.now();
    if(!last || (now - last) >= 23*60*60*1000) {
        popcorn += 50; localStorage.setItem('pico_last_pop', now); saveStats();
        alert("+50🍿 получен ✨");
    } else {
        const rem = (23*60*60*1000) - (now - last);
        const h = Math.floor(rem / (1000 * 60 * 60));
        alert(`жди еще ${h}ч. ⏳`);
    }
}

// игровой цикл (loop)
function loop() {
    if(playing) {
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = "#050505"; ctx.fillRect(0,0,w,h);
        
        // перемещение игрока
        if(ml.a) { plr.x += ml.x * plr.speed; plr.y += ml.y * plr.speed; }
        plr.x = Math.max(18, Math.min(w-18, plr.x));
        plr.y = Math.max(18, Math.min(h-18, plr.y));

        // логика ботов
        bots.forEach(b => {
            if(b.hp > 0) {
                let ang = Math.atan2(plr.y-b.y, plr.x-b.x);
                b.x += Math.cos(ang)*1.5; b.y += Math.sin(ang)*1.5;
                // баланс: урон только в упор
                if(Math.hypot(plr.x-b.x, plr.y-b.y) < 28) plr.hp -= 0.5;
                
                ctx.shadowBlur = 10; ctx.shadowColor = "#ff00de";
                ctx.fillStyle = "#ff00de"; ctx.beginPath(); ctx.arc(b.x, b.y, 14, 0, 7); ctx.fill();
                ctx.shadowBlur = 0;
            }
        });

        // логика пуль (автонаведение)
        bullets.forEach((bull, i) => {
            bull.x += Math.cos(bull.ang)*22; bull.y += Math.sin(bull.ang)*22;
            ctx.fillStyle = "#0f0"; ctx.beginPath(); ctx.arc(bull.x, bull.y, 4, 0, 7); ctx.fill();
            bots.forEach(b => {
                if(b.hp > 0 && Math.hypot(bull.x-b.x, bull.y-b.y) < 25) {
                    b.hp = 0; // баланс: смерть с 1 пули
                    bullets.splice(i,1); coins += 5; updateUI();
                }
            });
            if(bull.x < 0 || bull.x > w || bull.y < 0 || bull.y > h) bullets.splice(i, 1);
        });

        // рендер игрока
        ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
        ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(plr.x, plr.y, 18, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
        
        document.getElementById('hp-fill').style.width = plr.hp + "%";
        
        // протоколы завершения
        if(plr.hp <= 0) { alert("критический сбой системы 💀"); quitToMenu(); }
        if(bots.every(b => b.hp <= 0)) { coins += 30; popcorn += 5; alert("сектор зачищен! +30🟡 ✨"); quitToMenu(); }
    }
    requestAnimationFrame(loop);
}

function quitToMenu() { 
    playing = 0; 
    document.getElementById('game-screen').style.display='none'; 
    document.getElementById('menu-screen').style.display='flex'; 
    saveStats(); 
}

// ведение огня (автонаведение включено)
function fireWeapon() {
    if(ammo > 0) {
        let ang = mr.ang;
        // захват ближайшей цели
        let t = null; let minDist = Infinity;
        bots.forEach(b => {
            if(b.hp > 0) {
                let d = Math.hypot(plr.x-b.x, plr.y-b.y);
                if(d < minDist) { minDist = d; t = b; }
            }
        });
        if(t) ang = Math.atan2(t.y-plr.y, t.x-plr.x);
        
        bullets.push({x:plr.x, y:plr.y, ang: ang});
        ammo--; updateUI();
        if(ammo === 0) setTimeout(() => { ammo = 3; updateUI(); }, 600); // быстрая перезарядка
    }
}

// экономика
function buyCurrency(get, type, lose, loseType) {
    if(gems >= lose) { gems -= lose; coins += get; saveStats(); alert("обмен завершен ✨"); }
    else alert("недостаточно gems 💎");
}

// кастомизация
function applySkin(h,b,f) { document.getElementById('current-skin-display').innerHTML = `${h}<br>${b}<br>${f}`; saveStats(); closeMod(); }

// управление модалками
function openMod(id) { document.getElementById(id).style.display = 'block'; }
function closeMod() { document.querySelectorAll('.mdl').forEach(m => m.style.display = 'none'); }

// логика джойстиков
function handleJoystick(e, j, joyId, stickId, isAim) {
    const rect = document.getElementById(joyId).getBoundingClientRect();
    const stick = document.getElementById(stickId);
    const touches = e.touches || [e];
    const t = Array.from(touches).find(t => t.clientX > rect.left-30 && t.clientX < rect.right+30);
    if(t) {
        j.a = 1; let dx = t.clientX - (rect.left+42), dy = t.clientY - (rect.top+42);
        let dist = Math.min(Math.hypot(dx,dy), 35); j.ang = Math.atan2(dy, dx);
        if(!isAim) { j.x = Math.cos(j.ang)*(dist/35); j.y = Math.sin(j.ang)*(dist/35); }
        stick.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*dist}px), calc(-50% + ${Math.sin(j.ang)*dist}px))`;
    }
}

// ивенты ввода
window.addEventListener('touchstart', e => {
    handleJoystick(e, ml, 'joy-l-move', 'stick-head-l', false);
    handleJoystick(e, mr, 'joy-r-aim', 'stick-head-r', true);
    // огонь при нажатии на правую половину
    if(playing && Array.from(e.touches).some(t => t.clientX > w/2)) fireWeapon();
});
window.addEventListener('touchmove', e => { 
    e.preventDefault(); // блокировка скролла
    handleJoystick(e, ml, 'joy-l-move', 'stick-head-l', false);
    handleJoystick(e, mr, 'joy-r-aim', 'stick-head-r', true);
}, {passive:false});
window.addEventListener('touchend', e => {
    if(e.touches.length === 0) { ml.a = 0; document.getElementById('stick-head-l').style.transform = 'translate(-50%,-50%)'; }
    document.getElementById('stick-head-r').style.transform = 'translate(-50%,-50%)';
});

// старт системы
const profile = localStorage.getItem('pico_nick');
if(profile) {
    document.getElementById('disp-nickname').innerText = profile;
    document.getElementById('nick-screen').style.display = 'none';
    document.getElementById('menu-screen').style.display = 'flex';
    document.getElementById('ui-top-bar').style.display = 'flex';
    loadStats();
}
loop();
</script>
</body>
</html>
