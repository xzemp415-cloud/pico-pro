<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PICO ENGINE: VERTICAL PRO</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.ibb.co/v4F0RRKS/IMG-4539.jpg">
    <link rel="manifest" href='data:application/manifest+json,{"name":"PicoEngine","display":"standalone","orientation":"portrait","icons":[{"src":"https://i.ibb.co/v4F0RRKS/IMG-4539.jpg","sizes":"512x512","type":"image/jpeg"}]}'>

    <style>
        :root {
            --neon: #ff00de;
            --cyan: #00f2ff;
        }

        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; position: fixed; touch-action: none; 
            background: #000; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-user-select: none;
        }

        /* ЖЕСТКАЯ ФИКСАЦИЯ ВЕРХНЕЙ ПАНЕЛИ */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: 10px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--cyan);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-left: 15px;
            padding-right: 15px;
            z-index: 100;
        }

        .sc { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; z-index: 10; }
        
        /* КОРРЕКТНОЕ ОТОБРАЖЕНИЕ КАРТИНКИ И КАНВАСА */
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
            object-fit: contain; /* Предотвращает растягивание */
        }

        .bg-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            position: absolute; 
            z-index: -1; 
            opacity: 0.4; 
        }

        /* ИНТЕРФЕЙС ГЕЙМПЛЕЯ */
        .game-hud {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 60px);
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .p-card { 
            font-weight: 900; 
            color: var(--cyan); 
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--cyan);
        }

        .stats-row { display: flex; gap: 10px; }
        .s-box { 
            background: #111; 
            border: 1px solid #333; 
            padding: 4px 8px; 
            border-radius: 8px; 
            font-size: 13px;
            font-weight: bold;
        }

        /* КНОПКИ МЕНЮ */
        .menu-content {
            margin-top: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .main-char {
            font-size: 80px;
            line-height: 1;
            margin: 20px 0;
            filter: drop-shadow(0 0 20px var(--cyan));
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 80%;
            margin-bottom: 30px;
        }

        .action-btn {
            background: #111;
            border: 2px solid var(--neon);
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 0 10px var(--neon);
        }

        .play-trigger {
            width: 85%;
            background: var(--cyan);
            color: #000;
            padding: 20px;
            border-radius: 40px;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            box-shadow: 0 0 25px var(--cyan);
            margin-top: auto;
            margin-bottom: 60px;
        }

        /* МОДАЛКИ */
        .mdl { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #0a0a0a; border: 2px solid var(--neon); width: 90%; 
            border-radius: 25px; padding: 20px; display: none; z-index: 200; 
            box-shadow: 0 0 40px var(--neon);
        }

        .hp-bar { width: 140px; height: 12px; background: #222; border-radius: 6px; border: 1px solid #fff; margin: 10px auto; overflow: hidden; }
        #hp-val { height: 100%; width: 100%; background: #f00; transition: 0.2s; }

        .joystick { position: absolute; bottom: 60px; width: 90px; height: 90px; background: rgba(255,255,255,0.1); border: 2px solid; border-radius: 50%; z-index: 50; }
        #joy-move { left: 30px; border-color: var(--cyan); }
        #joy-aim { right: 30px; border-color: var(--neon); }
        .stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-top" class="top-bar" style="display:none">
        <div class="p-card" id="disp-nick">PICO</div>
        <div class="stats-row">
            <div class="s-box">🟡 <span id="c-count">0</span></div>
            <div class="s-box">💎 <span id="g-count">0</span></div>
            <div class="s-box">🍿 <span id="p-count">0</span></div>
        </div>
    </div>

    <div id="nick-sc" class="sc" style="display:flex; background: #000; justify-content: center;">
        <div style="text-align:center">
            <h1 style="color:var(--cyan); text-shadow: 0 0 10px var(--cyan);">PICO ENGINE</h1>
            <input type="text" id="nick-in" placeholder="NICKNAME" style="padding:15px; border-radius:10px; border:none; width:80%; text-align:center; font-size:20px; margin-bottom:20px;">
            <br>
            <button onclick="saveNick()" style="padding:15px 40px; background:var(--neon); border:none; color:#fff; font-weight:bold; border-radius:10px;">START SYSTEM</button>
        </div>
    </div>

    <div id="menu-sc" class="sc">
        <img src="https://i.ibb.co/DJsfqdJ/IMG-1949.jpg" class="bg-img">
        <div class="menu-content">
            <div class="main-char" id="main-skin">😀<br>🚹<br>🦵🏾🦵🏾</div>
            <div class="btn-grid">
                <div class="action-btn" onclick="openM('shop-mdl')">МАРКЕТ</div>
                <div class="action-btn" onclick="openM('skin-mdl')" style="border-color:var(--cyan); box-shadow:0 0 10px var(--cyan)">СКИНЫ</div>
            </div>
            <div class="play-trigger" onclick="goBattle()">В БОЙ</div>
        </div>
    </div>

    <div id="game-sc" class="sc">
        <div class="game-hud">
            <div class="hp-bar"><div id="hp-val"></div></div>
            <div id="ammo-info" style="color:var(--cyan); font-weight:bold;">AMMO: 3 / 3</div>
        </div>
        <canvas id="stage"></canvas>
        <div id="joy-move" class="joystick"><div id="stick-l" class="stick"></div></div>
        <div id="joy-aim" class="joystick"><div id="stick-r" class="stick"></div></div>
    </div>

    <div id="shop-mdl" class="mdl">
        <h2 style="text-align:center; color:var(--neon)">SHOP</h2>
        <button onclick="claimDaily()" style="width:100%; padding:15px; background:var(--cyan); border:none; font-weight:bold; margin-bottom:10px; border-radius:10px;">БУСТ +50🍿 (23ч)</button>
        <button onclick="buy(100,'c',50,'g')" style="width:100%; padding:15px; background:#222; color:#fff; border:1px solid var(--cyan); border-radius:10px;">+100🟡 ЗА 50💎</button>
        <button onclick="closeM()" style="width:100%; margin-top:20px; padding:10px; background:var(--neon); border:none; color:#fff; border-radius:10px;">CLOSE</button>
    </div>

    <div id="skin-mdl" class="mdl">
        <h2 style="text-align:center; color:var(--cyan)">SKINS</h2>
        <button onclick="setSkin('😀','🚹','🦵🏾🦵🏾')" style="width:100%; padding:10px; margin-bottom:5px;">CLASSIC</button>
        <button onclick="setSkin('😈','🥋','🔥')" style="width:100%; padding:10px; margin-bottom:5px;">DEMON</button>
        <button onclick="setSkin('🤖','🦾','⚙️')" style="width:100%; padding:10px;">ROBOT</button>
        <button onclick="closeM()" style="width:100%; margin-top:20px; padding:10px; background:var(--neon); border:none; color:#fff; border-radius:10px;">CLOSE</button>
    </div>

<script>
const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, playing = 0, ammo = 3, coins = 100, gems = 20, popcorn = 0;
let plr = {x:0, y:0, speed: 6, hp: 100};
let bots = [], bullets = [];
let ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};

function saveStats() {
    localStorage.setItem('pico_coins', coins);
    localStorage.setItem('pico_gems', gems);
    localStorage.setItem('pico_popcorn', popcorn);
    localStorage.setItem('pico_skin', document.getElementById('main-skin').innerHTML);
    refreshUI();
}

function loadStats() {
    coins = parseInt(localStorage.getItem('pico_coins')) || 100;
    gems = parseInt(localStorage.getItem('pico_gems')) || 20;
    popcorn = parseInt(localStorage.getItem('pico_popcorn')) || 0;
    const s = localStorage.getItem('pico_skin');
    if(s) document.getElementById('main-skin').innerHTML = s;
    refreshUI();
}

function refreshUI() {
    document.getElementById('c-count').innerText = coins;
    document.getElementById('g-count').innerText = gems;
    document.getElementById('p-count').innerText = popcorn;
    document.getElementById('ammo-info').innerText = `AMMO: ${ammo} / 3`;
}

function resize() { 
    w = canvas.width = window.innerWidth; 
    h = canvas.height = window.innerHeight; 
}
window.onresize = resize; resize();

function saveNick() {
    const n = document.getElementById('nick-in').value || "PICO";
    localStorage.setItem('pico_nick', n);
    document.getElementById('disp-nick').innerText = n;
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
    document.getElementById('ui-top').style.display = 'flex';
    loadStats();
}

function goBattle() {
    bots = []; bullets = [];
    for(let i=0; i<5; i++) bots.push({x: Math.random()*w, y: Math.random()*h, hp: 10});
    document.getElementById('menu-sc').style.display = 'none';
    document.getElementById('game-sc').style.display = 'flex';
    plr.x = w/2; plr.y = h/2; plr.hp = 100; playing = 1;
}

function claimDaily() {
    const last = localStorage.getItem('pico_last_pop');
    const now = Date.now();
    if(!last || (now - last) >= 23*60*60*1000) {
        popcorn += 50; localStorage.setItem('pico_last_pop', now); saveStats();
        alert("+50🍿!");
    } else alert("Ещё не время.");
}

function loop() {
    if(playing) {
        ctx.clearRect(0,0,w,h);
        ctx.fillStyle = "#050505"; ctx.fillRect(0,0,w,h);
        
        if(ml.a) { plr.x += ml.x * plr.speed; plr.y += ml.y * plr.speed; }
        plr.x = Math.max(20, Math.min(w-20, plr.x));
        plr.y = Math.max(20, Math.min(h-20, plr.y));

        bots.forEach(b => {
            if(b.hp > 0) {
                let ang = Math.atan2(plr.y-b.y, plr.x-b.x);
                b.x += Math.cos(ang)*1.5; b.y += Math.sin(ang)*1.5;
                if(Math.hypot(plr.x-b.x, plr.y-b.y) < 30) plr.hp -= 0.4;
                ctx.fillStyle = "#ff00de"; ctx.beginPath(); ctx.arc(b.x, b.y, 15, 0, 7); ctx.fill();
            }
        });

        bullets.forEach((bull, i) => {
            bull.x += Math.cos(bull.ang)*22; bull.y += Math.sin(bull.ang)*22;
            ctx.fillStyle = "#0f0"; ctx.beginPath(); ctx.arc(bull.x, bull.y, 5, 0, 7); ctx.fill();
            bots.forEach(b => {
                if(b.hp > 0 && Math.hypot(bull.x-b.x, bull.y-b.y) < 25) {
                    b.hp = 0; bullets.splice(i,1); coins += 5; refreshUI();
                }
            });
        });

        ctx.fillStyle = varColor('--cyan'); ctx.beginPath(); ctx.arc(plr.x, plr.y, 18, 0, 7); ctx.fill();
        document.getElementById('hp-val').style.width = plr.hp + "%";
        if(plr.hp <= 0) quit();
        if(bots.every(b => b.hp <= 0)) { coins += 30; popcorn += 5; alert("VICTORY!"); quit(); }
    }
    requestAnimationFrame(loop);
}

function quit() { playing = 0; document.getElementById('game-sc').style.display='none'; document.getElementById('menu-sc').style.display='flex'; saveStats(); }
function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name); }

function fire() {
    if(ammo > 0) {
        let ang = mr.ang;
        let t = bots.find(b => b.hp > 0);
        if(t) ang = Math.atan2(t.y-plr.y, t.x-plr.x);
        bullets.push({x:plr.x, y:plr.y, ang: ang});
        ammo--; refreshUI();
        if(ammo === 0) setTimeout(() => { ammo = 3; refreshUI(); }, 600);
    }
}

function handleJ(e, j, joyId, stickId, isAim) {
    const rect = document.getElementById(joyId).getBoundingClientRect();
    const stick = document.getElementById(stickId);
    const touches = e.touches || [e];
    const t = Array.from(touches).find(t => t.clientX > rect.left-40 && t.clientX < rect.right+40);
    if(t) {
        j.a = 1; let dx = t.clientX - (rect.left+45), dy = t.clientY - (rect.top+45);
        let dist = Math.min(Math.hypot(dx,dy), 35); j.ang = Math.atan2(dy, dx);
        if(!isAim) { j.x = Math.cos(j.ang)*(dist/35); j.y = Math.sin(j.ang)*(dist/35); }
        stick.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*dist}px), calc(-50% + ${Math.sin(j.ang)*dist}px))`;
    }
}

window.addEventListener('touchstart', e => {
    handleJ(e, ml, 'joy-move', 'stick-l', false);
    handleJ(e, mr, 'joy-aim', 'stick-r', true);
    if(Array.from(e.touches).some(t => t.clientX > w/2)) fire();
});
window.addEventListener('touchmove', e => { 
    e.preventDefault();
    handleJ(e, ml, 'joy-move', 'stick-l', false);
    handleJ(e, mr, 'joy-aim', 'stick-r', true);
}, {passive:false});
window.addEventListener('touchend', e => {
    if(e.touches.length === 0) { ml.a = 0; document.getElementById('stick-l').style.transform = 'translate(-50%,-50%)'; }
    document.getElementById('stick-r').style.transform = 'translate(-50%,-50%)';
});

function openM(id) { document.getElementById(id).style.display = 'block'; }
function closeM() { document.querySelectorAll('.mdl').forEach(m => m.style.display = 'none'); }
function setSkin(h,b,f) { document.getElementById('main-skin').innerHTML = `${h}<br>${b}<br>${f}`; saveStats(); closeM(); }
function buy(g,t,l,lt) { if(gems >= l) { gems -= l; coins += g; saveStats(); } else alert("No gems"); }

const saved = localStorage.getItem('pico_nick');
if(saved) {
    document.getElementById('disp-nick').innerText = saved;
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
    document.getElementById('ui-top').style.display = 'flex';
    loadStats();
}
loop();
</script>
</body>
</html>
