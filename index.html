<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pico pro engine</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .sc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; z-index: 10; }
        #nick-sc { display: flex; background: #000; justify-content: center; align-items: center; }
        #match-sc { background: linear-gradient(180deg, #00f2ff 0%, #7000ff 50%, #ff00de 100%); justify-content: center; text-align: center; }
        #game-sc { background: #050505; }
        #menu-sc { background: #000; }
        .n-box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #00f2ff; box-shadow: 0 0 15px #00f2ff; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ff00de; font-size: 18px; text-align: center; background: #222; color: #fff; box-shadow: inset 0 0 5px #ff00de; }
        .m-sun { width: 250px; height: 250px; background: #ff00de; border-radius: 50%; position: absolute; top: 20%; z-index: -1; filter: blur(30px); opacity: 0.6; }
        .m-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #fff; color: #fff; }
        .m-count { font-size: 36px; font-weight: bold; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        .hp-w { width: 110px; height: 10px; background: #333; border: 1px solid #fff; border-radius: 5px; margin: 0 auto; overflow: hidden; box-shadow: 0 0 8px #0f0; }
        #hp-f { width: 100%; height: 100%; background: #0f0; }
        .j { position: absolute; bottom: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid; z-index: 30; }
        #j-l { left: 20px; border-color: #00f2ff; box-shadow: 0 0 15px #00f2ff; }
        #j-r { right: 20px; border-color: #ff00de; box-shadow: 0 0 15px #ff00de; }
        .st { position: absolute; top: 50%; left: 50%; width: 35px; height: 35px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; pointer-events: none; }
        .bg { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: -1; opacity: 0.5; filter: saturate(1.5); }
        .top { position: absolute; top: 0; width: 100%; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .p-card { background: #111; padding: 6px 15px; border-radius: 5px; border: 1px solid #00f2ff; font-weight: bold; color: #00f2ff; box-shadow: 0 0 5px #00f2ff; }
        .stats { display: flex; gap: 8px; }
        .s-item { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 6px; border: 1px solid #444; font-size: 14px; color: #fff; }
        .side-btns { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; }
        .sq-btn { width: 65px; height: 65px; background: #111; border: 2px solid #ff00de; border-radius: 12px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 0 10px #ff00de; color: #fff; text-transform: lowercase; }
        .skin { font-size: 70px; text-align: center; margin-top: 90px; line-height: 1; filter: drop-shadow(0 0 10px #00f2ff); }
        .bottom-row { position: absolute; bottom: 35px; width: 92%; display: flex; gap: 10px; justify-content: center; }
        .m-select { flex: 1; background: #111; color: #00f2ff; padding: 16px; border-radius: 35px; border: 2px solid #00f2ff; font-weight: bold; text-align: center; font-size: 13px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px #00f2ff; text-transform: lowercase; }
        .play { flex: 1.2; background: #00f2ff; color: #000; padding: 16px; border-radius: 35px; border: 2px solid #fff; font-weight: bold; font-size: 20px; text-align: center; box-shadow: 0 0 20px #00f2ff; text-transform: lowercase; }
        .mdl { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #050505; border: 2px solid #ff00de; width: 85%; border-radius: 20px; padding: 20px; display: none; z-index: 100; overflow-y: auto; max-height: 80%; box-shadow: 0 0 30px #ff00de; }
        .act { border: 1px solid #444; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; background: #111; }
        .act span { font-size: 12px; color: #00f2ff; }
        .neon-t { color: #ff00de; text-shadow: 0 0 5px #ff00de; text-align: center; text-transform: lowercase; }
        .btn-buy { background: #0f0; border: none; padding: 5px 12px; border-radius: 5px; color: #000; font-weight: bold; font-size: 12px; box-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

    <div id="nick-sc" class="sc" style="display:flex">
        <div class="n-box">
            <h2 class="neon-t" style="margin:0">pico id</h2>
            <input type="text" id="nick-in" placeholder="введи ник">
            <button onclick="saveNick()" style="padding:12px; background:#00f2ff; border:none; font-weight:bold; border-radius:8px; color:#000; box-shadow: 0 0 10px #00f2ff;">вход</button>
        </div>
    </div>

    <div id="match-sc" class="sc">
        <div class="m-sun"></div>
        <div class="m-title">поиск сети...</div>
        <div class="m-count">игроки: <span id="p-found">0</span> / 5</div>
        <div id="m-timer" style="margin-top:10px; color:#fff; font-size:14px">старт через 10с</div>
        <div class="m-char" style="font-size: 50px; margin-top:20px;">🤖📡⚡️</div>
    </div>

    <div id="game-sc" class="sc">
        <div class="hud"><div class="hp-w"><div id="hp-f"></div></div><div id="ammo" style="color:#00f2ff; font-weight:bold; margin-top:5px; text-shadow: 0 0 5px #00f2ff;">3 / 3</div></div>
        <canvas id="stage"></canvas>
        <div id="j-l" class="j"><div id="s-l" class="st"></div></div>
        <div id="j-r" class="j"><div id="s-r" class="st"></div></div>
    </div>

    <div id="menu-sc" class="sc">
        <img src="https://i.ibb.co/DJsfqdJ/IMG-1949.jpg" class="bg">
        <div class="top">
            <div class="p-card" id="disp-nick">pico</div>
            <div class="stats">
                <div class="s-item">🟡 <span id="c-count">100</span></div>
                <div class="s-item">💎 <span id="g-count">20</span></div>
                <div class="s-item">🍿 <span id="p-count">0</span></div>
            </div>
        </div>
        <div class="side-btns">
            <div class="sq-btn" onclick="openM('shop-mdl')">нео-маркет</div>
            <div class="sq-btn" onclick="openM('skin-mdl')" style="border-color:#00f2ff; box-shadow:0 0 10px #00f2ff">скины</div>
        </div>
        <div class="skin" id="main-skin">😀<br>🚹<br>🦵🏾🦵🏾</div>
        <div class="bottom-row">
            <div class="m-select" onclick="openM('mode-mdl')"><span id="mode-tx">одиночное</span></div>
            <div class="play" onclick="startMatching()">в бой</div>
        </div>
    </div>

    <div id="shop-mdl" class="mdl">
        <h3 class="neon-t">нео-маркет</h3>
        <button id="daily-btn" onclick="claimDaily()" style="width:100%; background:#ff00de; border:none; padding:10px; border-radius:10px; font-weight:bold; color:#fff; margin-bottom:15px; box-shadow: 0 0 10px #ff00de;">🎁 бонус 50 попкорна</button>
        
        <p style="font-size:10px; color:#aaa">валюта</p>
        <div class="act"><span>10 💎 за 20 🟡</span><button class="btn-buy" onclick="buy(10,'g',20,'c')">обмен</button></div>
        <div class="act"><span>50 🟡 за 5 💎</span><button class="btn-buy" onclick="buy(50,'c',5,'g')" style="background:#00f2ff; box-shadow: 0 0 5px #00f2ff;">обмен</button></div>
        
        <p style="font-size:10px; color:#aaa">усилители</p>
        <div class="act"><span>нитро скорость (100 🍿)</span><button class="btn-buy" onclick="buyPop(100,'speed')">взять</button></div>
        <div class="act"><span>щит аура (150 🍿)</span><button class="btn-buy" onclick="alert('в разработке ✨')">взять</button></div>
        
        <button onclick="closeM()" style="width:100%; padding:10px; border-radius:10px; background:#222; border:1px solid #444; color:#fff; margin-top:10px;">назад</button>
    </div>

    <div id="skin-mdl" class="mdl">
        <h3 class="neon-t">гардероб</h3>
        <div class="act"><span>кибер-кот</span><button class="btn-buy" onclick="setSkin('🐱','🦾','👣')">выбрать</button></div>
        <div class="act"><span>нео-ниндзя</span><button class="btn-buy" onclick="setSkin('🥷','🥋','👟')">выбрать</button></div>
        <div class="act"><span>фантом</span><button class="btn-buy" onclick="setSkin('👻','🌫️','🫧')">выбрать</button></div>
        <button onclick="closeM()" style="width:100%; padding:10px; border-radius:10px; background:#222; border:1px solid #444; color:#fff; margin-top:10px;">назад</button>
    </div>

    <div id="mode-mdl" class="mdl">
        <div onclick="setM('одиночное')" style="padding:15px; color:#00f2ff; text-align:center; border-bottom:1px solid #222">одиночное</div>
        <div onclick="setM('парное')" style="padding:15px; color:#ff00de; text-align:center">парное</div>
        <button onclick="closeM()" style="width:100%; padding:10px; border-radius:10px; background:#222; border:1px solid #444; color:#fff; margin-top:10px;">отмена</button>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAqVnAGWpLJKWYoyMoqdyVg22Ks4U2Bq-0",
    projectId: "pico-server-pro",
    databaseURL: "https://pico-server-pro-default-rtdb.firebaseio.com",
    appId: "1:1066461989698:ios:58db1a5166b9c6dd9416db"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, playing = 0, ammo = 3, coins = 100, gems = 20, popcorn = 0;
let plr = {x:0, y:0, speed: 4.5, hp: 100, nick: "pico"};
let bots = [], bullets = [], currentMode = "одиночное";
let ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};
let matchTimer = null, matchTimeLeft = 10;

function saveStats() {
    localStorage.setItem('pico_coins', coins);
    localStorage.setItem('pico_gems', gems);
    localStorage.setItem('pico_popcorn', popcorn);
    refresh();
}

function loadStats() {
    coins = parseInt(localStorage.getItem('pico_coins')) || 100;
    gems = parseInt(localStorage.getItem('pico_gems')) || 20;
    popcorn = parseInt(localStorage.getItem('pico_popcorn')) || 0;
    refresh();
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function saveNick() {
    const n = document.getElementById('nick-in').value || "pico";
    plr.nick = n;
    localStorage.setItem('pico_nick', n);
    document.getElementById('disp-nick').innerText = n;
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
    loadStats();
}

function startMatching() {
    document.getElementById('menu-sc').style.display = 'none';
    document.getElementById('match-sc').style.display = 'flex';
    matchTimeLeft = 10;
    
    const myNick = plr.nick;
    const queueRef = db.ref('matchmaking/queue/' + myNick);
    
    queueRef.set({ nick: myNick, joinedAt: Date.now() });

    matchTimer = setInterval(() => {
        matchTimeLeft--;
        document.getElementById('m-timer').innerText = `старт через ${matchTimeLeft}с`;
        if(matchTimeLeft <= 0) {
            db.ref('matchmaking/queue').once('value', s => {
                forceStart(s.val() || {});
            });
        }
    }, 1000);

    db.ref('matchmaking/queue').on('value', (snapshot) => {
        const players = snapshot.val() || {};
        const count = Object.keys(players).length;
        document.getElementById('p-found').innerText = count;

        if (count >= 5) {
            forceStart(players);
        }
    });
}

function forceStart(playersData) {
    clearInterval(matchTimer);
    db.ref('matchmaking/queue').off();
    db.ref('matchmaking/queue/' + plr.nick).remove();
    goBattle(playersData);
}

function goBattle(playersData) {
    bots = []; 
    bullets = [];
    const playerList = Object.keys(playersData);

    // заполняем до 9 врагов (игроки + боты)
    for(let i = 0; i < 9; i++) {
        let name = playerList[i + 1] || "bot_" + (i + 1);
        bots.push({
            x: Math.random() * w, 
            y: Math.random() * h, 
            hp: 100, 
            nick: name, 
            team: (currentMode === "одиночное" ? i + 1 : (i < 1 ? 0 : i + 1)),
            targetAngle: Math.random() * Math.PI * 2,
            moveTimer: 0
        });
    }
    
    document.querySelectorAll('.sc').forEach(s => s.style.display = 'none');
    document.getElementById('game-sc').style.display = 'flex';
    plr.x = w/2; plr.y = h/2; plr.hp = 100; playing = 1;
}

function loop() {
    if(playing) {
        ctx.fillStyle = "#050505"; ctx.fillRect(0,0,w,h);
        
        // сетка фона
        ctx.strokeStyle = "#111"; ctx.lineWidth = 1;
        for(let i=0; i<w; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
        for(let i=0; i<h; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }

        if(ml.a) { plr.x += ml.x * plr.speed; plr.y += ml.y * plr.speed; }
        
        // границы
        plr.x = Math.max(20, Math.min(w-20, plr.x));
        plr.y = Math.max(20, Math.min(h-20, plr.y));

        if(mr.a) {
            ctx.strokeStyle = "rgba(0, 242, 255, 0.3)";
            ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(plr.x, plr.y);
            ctx.lineTo(plr.x + Math.cos(mr.ang)*150, plr.y + Math.sin(mr.ang)*150); ctx.stroke();
            ctx.setLineDash([]);
        }

        bots.forEach((b, bi) => {
            if(b.hp > 0) {
                // мягкий интеллект ботов
                b.moveTimer--;
                if(b.moveTimer <= 0) {
                    b.targetAngle = Math.random() * Math.PI * 2;
                    b.moveTimer = 60 + Math.random() * 100;
                }
                b.x += Math.cos(b.targetAngle) * 1.5;
                b.y += Math.sin(b.targetAngle) * 1.5;
                b.x = Math.max(20, Math.min(w-20, b.x));
                b.y = Math.max(20, Math.min(h-20, b.y));

                ctx.shadowBlur = 10; ctx.shadowColor = b.team === 0 ? "#0af" : "#ff00de";
                ctx.fillStyle = b.team === 0 ? "#0af" : "#ff00de";
                ctx.beginPath(); ctx.arc(b.x, b.y, 18, 0, 7); ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = "#fff"; ctx.font = "10px Arial";
                ctx.fillText(b.nick, b.x, b.y-25);
                
                bullets.forEach((bull, bui) => {
                    let d = Math.hypot(bull.x - b.x, bull.y - b.y);
                    if(d < 20) { b.hp -= 50; bullets.splice(bui, 1); }
                });
            }
        });

        bullets.forEach((bull, i) => {
            bull.x += Math.cos(bull.ang)*12; bull.y += Math.sin(bull.ang)*12;
            ctx.fillStyle = "#0f0"; ctx.shadowBlur = 5; ctx.shadowColor = "#0f0";
            ctx.beginPath(); ctx.arc(bull.x, bull.y, 4, 0, 7); ctx.fill();
            ctx.shadowBlur = 0;
            if(bull.x < 0 || bull.x > w || bull.y < 0 || bull.y > h) bullets.splice(i, 1);
        });

        ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
        ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(plr.x, plr.y, 18, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#fff"; ctx.fillText(plr.nick, plr.x, plr.y-25);

        document.getElementById('hp-f').style.width = plr.hp + "%";

        if(bots.every(b => b.hp <= 0 || b.team === 0)) {
            playing = 0; coins += 100; saveStats();
            alert("победа! +100 монет ✨"); location.reload();
        }
    }
    requestAnimationFrame(loop);
}
loop();

function fire() {
    if(ammo > 0) {
        bullets.push({x: plr.x, y: plr.y, ang: mr.ang});
        ammo--; refresh();
        if(ammo === 0) setTimeout(() => { ammo = 3; refresh(); }, 1500);
    }
}

function buy(getAm, getT, loseAm, loseT) {
    if(loseT === 'c' && coins >= loseAm) { coins -= loseAm; if(getT === 'g') gems += getAm; saveStats(); }
    else if(loseT === 'g' && gems >= loseAm) { gems -= loseAm; if(getT === 'c') coins += getAm; saveStats(); }
    else { alert("недостаточно средств ❌"); }
}

function buyPop(cost, type) {
    if(popcorn >= cost) { 
        popcorn -= cost; 
        if(type === 'speed') plr.speed += 2; 
        saveStats(); alert("скорость активирована! ✨");
    } else { alert("нужно больше попкорна 🍿"); }
}

function claimDaily() { 
    const last = localStorage.getItem('pico_daily');
    const now = Date.now();
    if(!last || now - last > 86400000) {
        popcorn += 50; localStorage.setItem('pico_daily', now); saveStats(); 
    } else { alert("уже получено сегодня ⛔️"); }
}

function setSkin(h, b, f) {
    document.getElementById('main-skin').innerHTML = `${h}<br>${b}<br>${f}`;
    closeM();
}

function refresh() {
    document.getElementById('ammo').innerText = ammo + " / 3";
    document.getElementById('c-count').innerText = coins;
    document.getElementById('g-count').innerText = gems;
    document.getElementById('p-count').innerText = popcorn;
}

function openM(id) { document.getElementById(id).style.display = 'block'; }
function closeM() { document.querySelectorAll('.mdl').forEach(m => m.style.display = 'none'); }
function setM(n) { currentMode = n; document.getElementById('mode-tx').innerText = n; closeM(); }

function handle(e, j, zId, sId, shoot) {
    const z = document.getElementById(zId).getBoundingClientRect();
    const s = document.getElementById(sId);
    const touches = e.touches || [e];
    const t = Array.from(touches).find(t => t.clientX > z.left-50 && t.clientX < z.right+50);
    if(t) {
        j.a = 1; let dx = t.clientX - (z.left+40), dy = t.clientY - (z.top+40);
        let d = Math.min(Math.hypot(dx,dy), 35); j.ang = Math.atan2(dy, dx);
        if(!shoot) { j.x = Math.cos(j.ang)*(d/35); j.y = Math.sin(j.ang)*(d/35); }
        s.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*d}px), calc(-50% + ${Math.sin(j.ang)*d}px))`;
    }
}

window.addEventListener('touchstart', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchmove', e => { e.preventDefault(); handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); }, {passive:false});
window.addEventListener('touchend', e => {
    if(e.touches.length === 0) {
        if(mr.a) fire();
        ml.a = 0; mr.a = 0;
        document.getElementById('s-l').style.transform = 'translate(-50%,-50%)';
        document.getElementById('s-r').style.transform = 'translate(-50%,-50%)';
    }
});

loadStats();
</script>
</body>
</html>
