<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PICO PRO ENGINE</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .sc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; z-index: 10; }

        /* Экраны */
        #nick-sc { display: flex; background: #000; justify-content: center; }
        #match-sc { background: linear-gradient(180deg, #ff71ad 0%, #a430ff 50%, #4a00e0 100%); justify-content: center; text-align: center; }
        #game-sc { background: #151515; }

        /* Ник */
        .n-box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #0055ff; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 8px; border: none; font-size: 18px; text-align: center; }
        
        /* Подбор игроков */
        .m-sun { width: 250px; height: 250px; background: #ffea00; border-radius: 50%; position: absolute; top: 20%; z-index: -1; filter: blur(10px); }
        .m-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .m-count { font-size: 36px; font-weight: bold; }
        .m-char { font-size: 80px; margin: 30px 0; position: relative; }

        /* Бой */
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; }
        .hp-w { width: 110px; height: 10px; background: #333; border: 1px solid #fff; border-radius: 5px; margin: 0 auto; overflow: hidden; }
        #hp-f { width: 100%; height: 100%; background: #0f0; }
        .j { position: absolute; bottom: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid; }
        #j-l { left: 20px; border-color: #0055ff; }
        #j-r { right: 20px; border-color: #f00; }
        .st { position: absolute; top: 50%; left: 50%; width: 35px; height: 35px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; }

        /* Меню */
        .bg { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: -1; opacity: 0.7; }
        .top { position: absolute; top: 0; width: 100%; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .p-card { background: #333; padding: 6px 15px; border-radius: 5px; border: 1px solid #555; font-weight: bold; }
        .stats { display: flex; gap: 8px; }
        .s-item { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 6px; border: 1px solid #444; font-size: 14px; }
        .side-btns { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; }
        .sq-btn { width: 65px; height: 65px; background: #333; border: 2px solid #555; border-radius: 12px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 4px 0 #111; }
        .skin { font-size: 70px; text-align: center; margin-top: 90px; line-height: 1; }
        .bottom-row { position: absolute; bottom: 15px; width: 92%; display: flex; gap: 10px; justify-content: center; }
        .m-select { flex: 1; background: #0055ff; padding: 16px; border-radius: 35px; border: 3px solid #fff; font-weight: bold; text-align: center; font-size: 13px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 0 #002266; }
        .play { flex: 1.2; background: #ffea00; color: #000; padding: 16px; border-radius: 35px; border: 3px solid #fff; font-weight: bold; font-size: 20px; text-align: center; box-shadow: 0 5px 0 #998800; }

        /* Модалки */
        .mdl { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #0055ff; width: 85%; border-radius: 20px; padding: 20px; display: none; z-index: 100; overflow-y: auto; max-height: 80%; }
        .act { border: 1px solid gold; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; }
        #daily-timer { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="nick-sc" class="sc" style="display:flex">
        <div class="n-box">
            <h2 style="margin:0; text-align:center">PICO ID</h2>
            <input type="text" id="nick-in" placeholder="ВВЕДИ НИК">
            <button onclick="saveNick()" style="padding:12px; background:#0f0; border:none; font-weight:bold; border-radius:8px;">ВХОД</button>
        </div>
    </div>

    <div id="match-sc" class="sc">
        <div class="m-sun"></div>
        <div class="m-title">Подбор игроков...</div>
        <div class="m-count">Найдено игроков <span id="p-found">0</span> из 10</div>
        <div class="m-char">😼⚽<div style="font-size: 40px; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);">🍿</div></div>
    </div>

    <div id="game-sc" class="sc">
        <div class="hud"><div class="hp-w"><div id="hp-f"></div></div><div id="ammo" style="color:#ff0; font-weight:bold; margin-top:5px;">3 / 3</div></div>
        <canvas id="stage"></canvas>
        <div id="j-l" class="j"><div id="s-l" class="st" style="border: 2px solid #0055ff"></div></div>
        <div id="j-r" class="j"><div id="s-r" class="st" style="border: 2px solid #f00"></div></div>
    </div>

    <div id="menu-sc" class="sc">
        <img src="https://i.ibb.co/DJsfqdJ/IMG-1949.jpg" class="bg">
        <div class="top">
            <div class="p-card" id="disp-nick">PICO</div>
            <div class="stats">
                <div class="s-item">🟡 <span id="c-count">100</span></div>
                <div class="s-item">💎 <span id="g-count">20</span></div>
                <div class="s-item">🍿 <span id="p-count">0</span></div>
            </div>
        </div>
        <div class="side-btns">
            <div class="sq-btn" onclick="openM('shop-mdl')">МАГАЗИН</div>
            <div class="sq-btn" style="opacity:0.5; color:#888">БОЙЦЫ<br>СКОРО</div>
        </div>
        <div class="skin">😀<br>🚹<br>🦵🏾🦵🏾</div>
        <div class="bottom-row">
            <div class="m-select" onclick="openM('mode-mdl')"><span id="mode-tx">Одиночное</span></div>
            <div class="play" onclick="startMatching()">ИГРАТЬ</div>
        </div>
    </div>

    <div id="shop-mdl" class="mdl">
        <h3 style="color:gold; margin-top:0; text-align:center">МАГАЗИН</h3>
        <div id="daily-timer"></div>
        <button id="daily-btn" onclick="claimDaily()" style="width:100%; background:#0f0; border:none; padding:10px; border-radius:10px; font-weight:bold; margin-bottom:15px;">🎁 ЗАБРАТЬ НАГРАДУ (ДЕНЬ 1)</button>
        
        <div class="act"><span>20 🟡</span><button onclick="buy(10,'g',20,'c')" style="background:gold; border:none; padding:5px 10px; border-radius:5px; font-weight:bold">10 💎</button></div>
        <div class="act"><span>6000 🟡</span><button onclick="buy(40,'g',6000,'c')" style="background:gold; border:none; padding:5px 10px; border-radius:5px; font-weight:bold">40 💎</button></div>
        
        <h4 style="color:#ff71ad; margin:10px 0 5px">АКЦИИ PICO</h4>
        <div class="act"><span>СКОРОСТЬ x2 (20м)</span><button onclick="buyPop(100,'speed')" style="background:#ffea00; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; color:#000">100 🍿</button></div>
        <div class="act"><span>30 ГЕМОВ</span><button onclick="buyPop(400,'gems')" style="background:#ffea00; border:none; padding:5px 10px; border-radius:5px; font-weight:bold; color:#000">400 🍿</button></div>
        
        <button onclick="closeM()" style="width:100%; padding:10px; border-radius:10px; margin-top:10px">ЗАКРЫТЬ</button>
    </div>

    <div id="mode-mdl" class="mdl">
        <div onclick="setM('Одиночное')">Одиночное (10 игр.)</div><hr style="border:0.5px solid #333">
        <div onclick="setM('Парное')">Парное (Команды по 2)</div><hr style="border:0.5px solid #333">
        <div onclick="setM('Тройное')">Тройное (Команды по 3)</div>
        <button onclick="closeM()" style="width:100%; margin-top:10px; padding:10px; border-radius:10px;">ОТМЕНА</button>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAqVnAGWpLJKWYoyMoqdyVg22Ks4U2Bq-0",
    projectId: "pico-server-pro",
    databaseURL: "https://pico-server-pro-default-rtdb.firebaseio.com",
    storageBucket: "pico-server-pro.firebasestorage.app",
    appId: "1:1066461989698:ios:58db1a5166b9c6dd9416db"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, playing = 0, ammo = 3, reload = 0, coins = 100, gems = 20, popcorn = 0;
let plr = {x:0, y:0, speed: 4.5}, bots = [], currentMode = "Одиночное";
let ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};
let matchTimer = null, playersFound = 0;

// Сохранение и загрузка баланса
function saveStats() {
    localStorage.setItem('pico_coins', coins);
    localStorage.setItem('pico_gems', gems);
    localStorage.setItem('pico_popcorn', popcorn);
    refresh();
}

function loadStats() {
    coins = parseInt(localStorage.getItem('pico_coins')) || 100;
    gems = parseInt(localStorage.getItem('pico_gems')) || 20;
    popcorn = parseInt(localStorage.getItem('pico_popcorn')) || 0;
    refresh();
}

function resize() {
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    plr.x = w/2; plr.y = h*0.7;
}
window.onresize = resize; resize();

function saveNick() {
    const n = document.getElementById('nick-in').value || "PICO";
    localStorage.setItem('pico_nick', n);
    document.getElementById('disp-nick').innerText = n;
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
    loadStats();
    updateDailyUI();
}

// Система ежедневных наград
const dailyRewards = [
    { name: "30 монет", type: "c", amt: 30 },
    { name: "10 попкорнов", type: "p", amt: 10 },
    { name: "5 гемов", type: "g", amt: 5 },
    { name: "10 монет", type: "c", amt: 10 },
    { name: "7 попкорнов", type: "p", amt: 7 }
];

function updateDailyUI() {
    let day = parseInt(localStorage.getItem('pico_day')) || 1;
    let lastTime = parseInt(localStorage.getItem('pico_last_claim')) || 0;
    let now = Date.now();
    let btn = document.getElementById('daily-btn');
    let timerDisp = document.getElementById('daily-timer');

    if (day > 5) day = 1;

    if (now - lastTime < 23 * 3600000) {
        btn.disabled = true;
        btn.style.opacity = "0.5";
        let diff = (23 * 3600000) - (now - lastTime);
        let hours = Math.floor(diff / 3600000);
        let mins = Math.floor((diff % 3600000) / 60000);
        timerDisp.innerText = `До след. награды: ${hours}ч ${mins}м`;
        btn.innerText = `ДЕНЬ ${day} (ЗАБРАНО)`;
    } else {
        btn.disabled = false;
        btn.style.opacity = "1";
        timerDisp.innerText = "Награда доступна!";
        btn.innerText = `🎁 ЗАБРАТЬ: ${dailyRewards[day-1].name}`;
    }
}

function claimDaily() {
    let day = parseInt(localStorage.getItem('pico_day')) || 1;
    let reward = dailyRewards[day-1];

    if (reward.type === 'c') coins += reward.amt;
    if (reward.type === 'g') gems += reward.amt;
    if (reward.type === 'p') popcorn += reward.amt;

    localStorage.setItem('pico_last_claim', Date.now());
    localStorage.setItem('pico_day', day + 1);
    saveStats();
    updateDailyUI();
    alert(`Получено: ${reward.name}!`);
}

// Подбор игроков
function startMatching() {
    document.getElementById('menu-sc').style.display = 'none';
    document.getElementById('match-sc').style.display = 'flex';
    playersFound = 1;
    document.getElementById('p-found').innerText = playersFound;

    const myNick = localStorage.getItem('pico_nick') || "PICO";
    const matchRef = db.ref('queue').push({ name: myNick, time: Date.now() });

    let sec = 0;
    matchTimer = setInterval(() => {
        sec++;
        db.ref('queue').once('value', (snap) => {
            let count = snap.numChildren();
            playersFound = count > 10 ? 10 : count;
            document.getElementById('p-found').innerText = playersFound;
            if (playersFound >= 10) { 
                clearInterval(matchTimer); 
                matchRef.remove(); 
                goBattle(); 
            }
        });
        if (sec >= 20) { clearInterval(matchTimer); matchRef.remove(); goBattle(); }
    }, 1000);
}

function goBattle() {
    bots = [];
    let count = 9; // Одиночное по умолчанию
    for(let i=0; i<count; i++) {
        bots.push({
            x: Math.random()*w, 
            y: Math.random()*(h*0.5), 
            hp: 100, 
            nick: "BOT_" + Math.floor(Math.random()*99),
            team: (currentMode === "Одиночное") ? i+1 : (currentMode === "Парное" ? Math.floor(i/2)+1 : Math.floor(i/3)+1)
        });
    }
    // Напарник для игрока в тимах
    if (currentMode !== "Одиночное") {
        bots[0].team = 0; // Твой напарник
        bots[0].nick = "НАПАРНИК";
    }

    document.querySelectorAll('.sc').forEach(s => s.style.display = 'none');
    document.getElementById('game-sc').style.display = 'flex';
    playing = 1;
}

// Бой и отображение
function loop() {
    if(playing) {
        ctx.clearRect(0,0,w,h);
        if(ml.a) { plr.x += ml.x * plr.speed; plr.y += ml.y * plr.speed; }
        
        // Линия прицела
        if(mr.a) {
            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.moveTo(plr.x, plr.y);
            ctx.lineTo(plr.x + Math.cos(mr.ang)*500, plr.y + Math.sin(mr.ang)*500); ctx.stroke();
        }

        // Рендер ботов и ников
        bots.forEach(b => {
            if(b.hp > 0) {
                ctx.fillStyle = (b.team === 0) ? '#0af' : '#f33'; // Синий напарник, красные враги
                ctx.beginPath(); ctx.arc(b.x, b.y, 18, 0, 7); ctx.fill();
                
                ctx.fillStyle = '#fff'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
                ctx.fillText(b.nick, b.x, b.y - 25);
            }
        });

        // Игрок
        ctx.fillStyle = '#3f3'; ctx.beginPath(); ctx.arc(plr.x, plr.y, 15, 0, 7); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.fillText(localStorage.getItem('pico_nick'), plr.x, plr.y - 25);
    }
    requestAnimationFrame(loop);
}
loop();

function fire() {
    ammo--; refresh();
    bots.forEach(b => {
        if(b.hp > 0 && b.team !== 0) { // Не бьем напарника
            let a = Math.atan2(b.y - plr.y, b.x - plr.x);
            if(Math.abs(a - mr.ang) < 0.25) b.hp -= 50;
        }
    });
    
    // Проверка победы (если остались только тимейты)
    if(bots.every(b => b.hp <= 0 || b.team === 0)) {
        playing = 0;
        coins += 200; saveStats();
        alert("ПОБЕДА! +200 МОНЕТ");
        document.getElementById('game-sc').style.display = 'none';
        document.getElementById('menu-sc').style.display = 'flex';
    }
    if(ammo === 0) { reload = 1; setTimeout(() => { ammo = 3; reload = 0; refresh(); }, 3000); }
}

// Магазин попкорна
function buyPop(cost, type) {
    if (popcorn >= cost) {
        popcorn -= cost;
        if (type === 'speed') {
            plr.speed = 9; 
            setTimeout(() => { plr.speed = 4.5; alert("Скорость x2 закончилась"); }, 20 * 60000);
            alert("Скорость x2 активирована на 20 мин!");
        }
        if (type === 'gems') { gems += 30; alert("+30 Гемов!"); }
        saveStats();
        closeM();
    } else { alert("Недостаточно попкорна!"); }
}

function refresh() {
    document.getElementById('ammo').innerText = reload ? "🔄" : ammo + " / 3";
    document.getElementById('c-count').innerText = coins;
    document.getElementById('g-count').innerText = gems;
    document.getElementById('p-count').innerText = popcorn;
}

function openM(id) { 
    document.getElementById(id).style.display = 'block'; 
    if(id === 'shop-mdl') updateDailyUI();
}
function closeM() { document.querySelectorAll('.mdl').forEach(m => m.style.display = 'none'); }
function setM(n) { currentMode = n; document.getElementById('mode-tx').innerText = n; closeM(); }

function buy(p, tP, am, tG) {
    let balance = (tP === 'g') ? gems : coins;
    if(balance >= p) {
        if(tP === 'g') gems -= p; else coins -= p;
        if(tG === 'c') coins += am; else gems += am;
        alert("КУПЛЕНО!"); saveStats();
    } else { alert("МАЛО СРЕДСТВ!"); }
}

// Управление
function handle(e, j, zId, sId, shoot) {
    const z = document.getElementById(zId).getBoundingClientRect();
    const s = document.getElementById(sId);
    const t = Array.from(e.touches).find(t => t.clientX > z.left-30 && t.clientX < z.right+30 && t.clientY > z.top-30 && t.clientY < z.bottom+30);
    if(t) {
        j.a = 1; let dx = t.clientX - (z.left + 40), dy = t.clientY - (z.top + 40);
        let d = Math.min(Math.sqrt(dx*dx + dy*dy), 38); j.ang = Math.atan2(dy, dx);
        if(!shoot) { j.x = Math.cos(j.ang)*(d/38); j.y = Math.sin(j.ang)*(d/38); }
        s.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*d}px), calc(-50% + ${Math.sin(j.ang)*d}px))`;
    }
}
window.addEventListener('touchstart', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchmove', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchend', e => {
    if(e.touches.length === 0) {
        if(mr.a && ammo > 0 && !reload) fire();
        ml.a = 0; ml.x = 0; ml.y = 0; mr.a = 0;
        document.getElementById('s-l').style.transform = 'translate(-50%,-50%)';
        document.getElementById('s-r').style.transform = 'translate(-50%,-50%)';
    }
});

// Старт
const saved = localStorage.getItem('pico_nick');
if(saved) {
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
    document.getElementById('disp-nick').innerText = saved;
    loadStats();
}
</script>
</body>
</html>
