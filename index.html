<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pico Pro Engine</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .sc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #nick-sc { display: flex; background: #000; }
        .n-box { background: #111; padding: 25px; border-radius: 20px; border: 2px solid #0055ff; width: 85%; max-width: 300px; display: flex; flex-direction: column; gap: 12px; }
        input { padding: 12px; border-radius: 10px; border: none; font-size: 18px; text-align: center; background: #222; color: #fff; width: 100%; }
        .btn { padding: 14px; background: #0f0; border: none; border-radius: 12px; font-weight: bold; color: #000; cursor: pointer; }
        #menu-sc { background: #000; }
        .bg { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: -1; opacity: 0.5; }
        .top-bar { position: absolute; top: 10px; width: 95%; display: flex; justify-content: space-between; z-index: 5; }
        .stat { background: rgba(30,30,30,0.9); padding: 6px 12px; border-radius: 8px; border: 1px solid #444; font-size: 13px; }
        .skin-container { margin-top: 20px; display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
        .skin-part { font-size: 40px; display: block; height: 45px; }
        .play-btn { position: absolute; bottom: 25px; width: 85%; background: #ffea00; color: #000; padding: 16px; border-radius: 35px; border: 3px solid #fff; font-weight: bold; font-size: 22px; text-align: center; }
        .mdl { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #0055ff; width: 92%; height: 85%; border-radius: 25px; padding: 15px; display: none; z-index: 100; overflow-y: auto; }
        .m-section { margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .m-section h3 { color: gold; font-size: 16px; margin: 5px 0; text-transform: uppercase; }
        .item { background: #1a1a1a; padding: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border: 1px solid #333; }
        .buy-b { background: #0f0; border: none; padding: 6px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .blue-btn { display: block; width: 100%; background: #0055ff; color: #fff; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 10px; border: none; }
        #match-sc { background: #000; z-index: 50; }
        #game-sc { background: #151515; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 40px; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        .hp-w { width: 150px; height: 15px; background: #333; border: 2px solid #fff; border-radius: 10px; margin: 0 auto; overflow: hidden; }
        #hp-f { width: 100%; height: 100%; background: #0f0; transition: 0.2s; }
        .j { position: absolute; bottom: 50px; width: 90px; height: 90px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid; touch-action: none; }
        #j-l { left: 30px; border-color: #0055ff; }
        #j-r { right: 30px; border-color: #f00; }
        .st { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; pointer-events: none; }
    </style>
</head>
<body>

    <div id="nick-sc" class="sc">
        <div class="n-box">
            <h2 style="text-align:center; margin:0">pico id</h2>
            <input type="text" id="nick-in" placeholder="Никнейм" maxlength="12">
            <button class="btn" onclick="saveNick()">ВХОД</button>
        </div>
    </div>

    <div id="match-sc" class="sc">
        <h2 id="match-status">ПОДБОР ИГРОКОВ...</h2>
        <div style="font-size: 24px; color: gold;"><span id="p-count">1</span> / 5</div>
        <div id="timer" style="margin-top:10px">Осталось: 10с</div>
    </div>

    <div id="menu-sc" class="sc">
        <img src="https://i.ibb.co/DJsfqdJ/IMG-1949.jpg" class="bg">
        <div class="top-bar">
            <div class="stat" id="disp-nick">pico</div>
            <div style="display:flex; gap:5px">
                <div class="stat">🟡 <span id="c-count">100</span></div>
                <div class="stat">💎 <span id="g-count">20</span></div>
            </div>
        </div>
        <div style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%);">
            <div style="width: 65px; height: 65px; background: #222; border: 2px solid #0055ff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: gold; text-align: center;" onclick="openM('shop-mdl')">МАГАЗИН</div>
        </div>
        <div class="skin-container">
            <span class="skin-part">😀</span><span class="skin-part">🚹</span><span class="skin-part">🦵🏾🦵🏾</span>
        </div>
        <div class="play-btn" onclick="startMatching()">ИГРАТЬ</div>
    </div>

    <div id="shop-mdl" class="mdl">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 style="color:#0055ff; margin:0">PICO SHOP</h2>
            <button onclick="closeM()" style="background:#f33; border:none; color:#fff; padding:5px 12px; border-radius:8px">X</button>
        </div>
        <div class="m-section">
            <h3>🔥 Акции</h3>
            <div class="item"><span>Набор Бойца (200💎)</span><button class="buy-b" onclick="buy(0,200)">0 🟡</button></div>
        </div>
        <div class="m-section">
            <h3>🏷️ Товары</h3>
            <div class="item"><span>Золотой Скин</span><button class="buy-b" onclick="buy(500,0)">500 🟡</button></div>
        </div>
        <div class="m-section">
            <h3>📦 Продукты</h3>
            <div class="item"><span>Аптечка +500 HP</span><button class="buy-b" onclick="buy(100,0)">100 🟡</button></div>
        </div>
        <div class="m-section">
            <h3>🎫 Промокод</h3>
            <input type="text" id="promo-in" placeholder="Введи код">
            <button class="btn" style="width:100%; margin-top:10px" onclick="usePromo()">ОК</button>
            <a href="https://t.me/+FYqVAyAicHUwNTJi" class="blue-btn">ПОЛУЧИТЬ ПРОМОКОД</a>
        </div>
    </div>

    <div id="game-sc" class="sc">
        <div class="hud">
            <div class="hp-w"><div id="hp-f"></div></div>
            <div id="ammo-txt" style="margin-top:5px; font-weight:bold; text-shadow: 1px 1px 2px #000">1000 / 1000</div>
        </div>
        <canvas id="stage"></canvas>
        <div id="j-l" class="j"><div id="s-l" class="st"></div></div>
        <div id="j-r" class="j"><div id="s-r" class="st"></div></div>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAqVnAGWpLJKWYoyMoqdyVg22Ks4U2Bq-0",
    projectId: "pico-server-pro",
    databaseURL: "https://pico-server-pro-default-rtdb.firebaseio.com",
    appId: "1:1066461989698:ios:58db1a5166b9c6dd9416db"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let coins = 100, gems = 20, myNick = "pico", playing = false;
let w, h, canvas, ctx, ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};
let plr = {x:0,y:0,hp:1000,maxHp:1000,r:20,speed:4};
let entities = [], bullets = [];

function saveNick() {
    const val = document.getElementById('nick-in').value.trim();
    if(!val) return alert("Введи ник!");
    myNick = val; localStorage.setItem('pico_nick', val);
    db.ref('users/' + val).update({ online: true, last: Date.now() });
    showMenu();
}

function showMenu() {
    document.getElementById('disp-nick').innerText = myNick;
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
}

function startMatching() {
    document.getElementById('menu-sc').style.display = 'none';
    document.getElementById('match-sc').style.display = 'flex';
    let count = 1, timeLeft = 10;
    const qRef = db.ref('queue/' + myNick);
    qRef.set(true);

    const timer = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').innerText = `Осталось: ${timeLeft}с`;
        db.ref('queue').once('value', s => {
            let n = s.numChildren();
            document.getElementById('p-count').innerText = n > 5 ? 5 : n;
            if(n >= 5 || timeLeft <= 0) {
                clearInterval(timer);
                qRef.remove();
                initGame(n);
            }
        });
    }, 1000);
}

function initGame(playerCount) {
    document.getElementById('match-sc').style.display = 'none';
    document.getElementById('game-sc').style.display = 'flex';
    canvas = document.getElementById('stage');
    ctx = canvas.getContext('2d');
    resize();
    plr.x = w/2; plr.y = h/2; plr.hp = 1000;
    entities = []; bullets = [];
    
    for(let i=0; i < (5 - playerCount + 4); i++) {
        entities.push({
            x: Math.random()*w, y: Math.random()*h, 
            hp: 1000, r: 20, isBot: true, 
            lastShot: 0, vx: Math.random()*2-1, vy: Math.random()*2-1
        });
    }
    playing = true;
    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if(!playing) return;
    ctx.fillStyle = "#151515"; ctx.fillRect(0,0,w,h);

    if(ml.a) {
        plr.x += ml.x * plr.speed; plr.y += ml.y * plr.speed;
        plr.x = Math.max(20, Math.min(w-20, plr.x));
        plr.y = Math.max(20, Math.min(h-20, plr.y));
    }

    entities.forEach(e => {
        if(e.hp <= 0) return;
        e.x += e.vx * 2; e.y += e.vy * 2;
        if(e.x<20 || e.x>w-20) e.vx *= -1; if(e.y<20 || e.y>h-20) e.vy *= -1;
        
        if(Date.now() - e.lastShot > 1500) {
            let ang = Math.atan2(plr.y-e.y, plr.x-e.x);
            bullets.push({x: e.x, y: e.y, a: ang, side: 'enemy'});
            e.lastShot = Date.now();
        }
        ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, 7); ctx.fill();
    });

    bullets.forEach((b, i) => {
        b.x += Math.cos(b.a)*8; b.y += Math.sin(b.a)*8;
        ctx.fillStyle = b.side === 'player' ? "cyan" : "orange";
        ctx.beginPath(); ctx.arc(b.x, b.y, 5, 0, 7); ctx.fill();

        if(b.side === 'player') {
            entities.forEach(e => {
                if(e.hp > 0 && Math.hypot(b.x-e.x, b.y-e.y) < 25) { e.hp -= 50; bullets.splice(i, 1); }
            });
        } else if(Math.hypot(b.x-plr.x, b.y-plr.y) < 25) {
            plr.hp -= 50; bullets.splice(i, 1);
            updateHUD();
        }
    });

    ctx.fillStyle = "#0f0"; ctx.beginPath(); ctx.arc(plr.x, plr.y, plr.r, 0, 7); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.fillText(myNick, plr.x - 15, plr.y - 30);
    
    if(plr.hp <= 0) { playing = false; alert("ВЫ ПРОИГРАЛИ!"); location.reload(); }
    requestAnimationFrame(gameLoop);
}

function updateHUD() {
    let p = (plr.hp / plr.maxHp) * 100;
    document.getElementById('hp-f').style.width = p + "%";
    document.getElementById('ammo-txt').innerText = `${plr.hp} / 1000`;
}

function usePromo() {
    const code = document.getElementById('promo-in').value.toUpperCase();
    const now = new Date();
    const deadline = new Date('2026-04-16');
    if(now > deadline) return alert("Срок промокода истек!");
    if(code === 'PICO2026') {
        coins += 50; updateStats(); alert("Бонус +50 монет!");
    } else { alert("Неверный код"); }
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
function openM(id) { document.getElementById(id).style.display = 'block'; }
function closeM() { document.querySelectorAll('.mdl').forEach(m => m.style.display = 'none'); }
function updateStats() { document.getElementById('c-count').innerText = coins; document.getElementById('g-count').innerText = gems; }
function buy(c, g) { if(coins >= c) { coins -= c; gems += g; updateStats(); alert("Куплено!"); } else alert("Мало монет!"); }

window.onload = () => { if(localStorage.getItem('pico_nick')) { myNick = localStorage.getItem('pico_nick'); showMenu(); } };

function handle(e, j, zId, sId, shoot) {
    const z = document.getElementById(zId).getBoundingClientRect();
    const s = document.getElementById(sId);
    const t = Array.from(e.touches).find(t => t.clientX > z.left-20 && t.clientX < z.right+20);
    if(t) {
        j.a = 1; let dx = t.clientX - (z.left+45), dy = t.clientY - (z.top+45);
        let d = Math.min(Math.hypot(dx,dy), 40); j.ang = Math.atan2(dy, dx);
        if(!shoot) { j.x = Math.cos(j.ang)*(d/40); j.y = Math.sin(j.ang)*(d/40); }
        s.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*d}px), calc(-50% + ${Math.sin(j.ang)*d}px))`;
    }
}
window.addEventListener('touchstart', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchmove', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchend', e => { if(e.touches.length === 0) { if(mr.a) bullets.push({x:plr.x, y:plr.y, a:mr.ang, side:'player'}); ml.a = 0; mr.a = 0; } });
</script>
</body>
</html>
