<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>boottle flip!</title>
    
    <meta name="theme-color" content="#ffd700">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/bMSVRPFZ/copy-BBBD0921-96-CE-4824-ACE6-CB12-D74-A224-B.jpg">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: white; font-family: sans-serif; }
        .screen { display: none; width: 100vw; height: 100vh; position: relative; background-size: cover; background-position: center; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* загрузка */
        #loading-screen { background-image: url('https://i.ibb.co/jvBPTLXp/IMG-4177.jpg'); }
        .loader-container { position: absolute; bottom: 50px; width: 80%; height: 20px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 2px solid #ffd700; }
        #loader-bar { width: 0%; height: 100%; background: #ffd700; box-shadow: 0 0 15px #ffd700; transition: width 0.1s linear; }

        /* меню */
        #menu-screen { background-image: url('https://i.ibb.co/844Cn9dP/IMG-4684.jpg'); }
        .account-info { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; font-weight: bold; }
        .play-button { position: absolute; bottom: 10%; padding: 15px 60px; font-size: 2.5rem; background: transparent; color: #fff; border: 4px solid #fffb00; border-radius: 50px; cursor: pointer; box-shadow: 0 0 10px #fffb00; text-shadow: 0 0 10px #fffb00; }

        /* игровая зона */
        #game-screen { background: #222; }
        #counter { position: absolute; top: 20px; right: 20px; color: #00ff00; font-size: 2rem; font-weight: bold; }
        #swipe-area { position: absolute; bottom: 50px; width: 200px; height: 60px; background: #ffd700; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; box-shadow: 0 0 20px #ffd700; }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        #result-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

    <div id="loading-screen" class="screen active">
        <div class="loader-container"><div id="loader-bar"></div></div>
    </div>

    <div id="nickname-screen" class="screen">
        <div style="text-align: center; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 20px; border: 2px solid #ffd700;">
            <h2>введи имя профиля 🏆</h2>
            <input type="text" id="nickname-input" style="padding: 10px; font-size: 1.2rem;">
            <button onclick="saveNick()" style="padding: 10px 20px; background: #ffd700; border: none; margin-top: 10px;">ок</button>
        </div>
    </div>

    <div id="menu-screen" class="screen">
        <div class="account-info" id="display-name">игрок</div>
        <button class="play-button" onclick="startGame()">играть</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="counter">1/5</div>
        <video id="game-video" playsinline></video>
        <img id="result-img" src="https://i.ibb.co/nsvmZN7s/IMG-4687.jpg" alt="fail">
        <div id="swipe-area">смахни вверх! ☝️</div>
    </div>

    <script>
        [span_0](start_span)// конфиг из твоего файла[span_0](end_span)
        const firebaseConfig = {
            apiKey: "AIzaSyAqVnAGWpLJKWYoyMoqdyVg22Ks4U2Bq-0",
            projectId: "pico-server-pro",
            databaseURL: "https://pico-server-pro.firebaseio.com", // обычно проект-ид.firebaseio.com
            storageBucket: "pico-server-pro.firebasestorage.app",
            appId: "1:1066461989698:ios:58db1a5166b9c6dd9416db"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentAttempts = 0;
        let successfulFlips = 0;

        // логика загрузки 10 сек
        let progress = 0;
        const loaderInterval = setInterval(() => {
            progress += 1;
            document.getElementById('loader-bar').style.width = progress + '%';
            if (progress >= 100) {
                clearInterval(loaderInterval);
                checkUser();
            }
        }, 100);

        function checkUser() {
            const savedNick = localStorage.getItem('bottle_nick');
            document.getElementById('loading-screen').classList.remove('active');
            if (savedNick) {
                document.getElementById('display-name').innerText = savedNick;
                document.getElementById('menu-screen').classList.add('active');
            } else {
                document.getElementById('nickname-screen').classList.add('active');
            }
        }

        function saveNick() {
            const nick = document.getElementById('nickname-input').value;
            if (nick) {
                localStorage.setItem('bottle_nick', nick);
                db.ref('users/' + nick).set({ joined: Date.now() });
                location.reload();
            }
        }

        function startGame() {
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            resetTurn();
        }

        function resetTurn() {
            document.getElementById('game-video').style.display = 'none';
            document.getElementById('result-img').style.display = 'none';
            document.getElementById('swipe-area').style.display = 'flex';
        }

        // логика свайпа
        let touchStartY = 0;
        document.getElementById('swipe-area').addEventListener('touchstart', e => {
            touchStartY = e.changedTouches[0].screenY;
        });

        document.getElementById('swipe-area').addEventListener('touchend', e => {
            let touchEndY = e.changedTouches[0].screenY;
            if (touchStartY - touchEndY > 50) { // свайп вверх
                handleFlip();
            }
        });

        function handleFlip() {
            currentAttempts++;
            const video = document.getElementById('game-video');
            const swipeArea = document.getElementById('swipe-area');
            swipeArea.style.display = 'none';
            video.style.display = 'block';

            // шанс успеха 50/50 для теста
            const isSuccess = Math.random() > 0.5;

            if (currentAttempts === 1) {
                if (isSuccess) {
                    successfulFlips++;
                    video.src = "https://www.kapwing.com/videos/69ca6896c05ba89953e44674";
                } else {
                    video.src = "https://www.kapwing.com/videos/69ca697783482d6fe4848eee";
                }
            } else if (currentAttempts === 2) {
                if (isSuccess) {
                    successfulFlips++;
                    video.src = "https://www.kapwing.com/videos/69ca69e3cc424500f42b4370";
                } else {
                    video.src = "https://www.kapwing.com/videos/69ca69049f87653f23461278";
                }
            }

            video.play();
            
            video.onended = () => {
                if (currentAttempts >= 5 || (currentAttempts === 2 && !isSuccess)) {
                    // конец игры или промах на 2-м
                    document.getElementById('game-screen').classList.remove('active');
                    document.getElementById('menu-screen').classList.add('active');
                } else {
                    document.getElementById('counter').innerText = (currentAttempts + 1) + "/5";
                    resetTurn();
                }
            };

            // если ни одного броска (логика простоя)
            if (currentAttempts === 0) {
                document.getElementById('result-img').style.display = 'block';
            }
        }
    </script>
</body>
</html>
