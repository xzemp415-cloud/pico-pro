<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pico pro engine</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="pico pro">
    <link rel="manifest" href="manifest.json">

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .sc { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; z-index: 10; }
        #nick-sc { display: flex; background: #000; justify-content: center; align-items: center; }
        #match-sc { background: linear-gradient(180deg, #ff71ad 0%, #a430ff 50%, #4a00e0 100%); justify-content: center; text-align: center; }
        #game-sc { background: #151515; }
        #menu-sc { background: #000; }
        .n-box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #0055ff; display: flex; flex-direction: column; gap: 15px; }
        input { padding: 12px; border-radius: 8px; border: none; font-size: 18px; text-align: center; background: #222; color: #fff; }
        .m-sun { width: 250px; height: 250px; background: #ffea00; border-radius: 50%; position: absolute; top: 20%; z-index: -1; filter: blur(10px); }
        .m-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .m-count { font-size: 36px; font-weight: bold; }
        canvas { display: block; width: 100%; height: 100%; }
        .hud { position: absolute; top: 15px; width: 100%; text-align: center; pointer-events: none; z-index: 20; }
        .hp-w { width: 110px; height: 10px; background: #333; border: 1px solid #fff; border-radius: 5px; margin: 0 auto; overflow: hidden; }
        #hp-f { width: 100%; height: 100%; background: #0f0; }
        .j { position: absolute; bottom: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid; z-index: 30; }
        #j-l { left: 20px; border-color: #0055ff; }
        #j-r { right: 20px; border-color: #f00; }
        .st { position: absolute; top: 50%; left: 50%; width: 35px; height: 35px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.8; pointer-events: none; }
        .bg { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: -1; opacity: 0.7; }
        .top { position: absolute; top: 0; width: 100%; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        .p-card { background: #333; padding: 6px 15px; border-radius: 5px; border: 1px solid #555; font-weight: bold; }
        .stats { display: flex; gap: 8px; }
        .s-item { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 6px; border: 1px solid #444; font-size: 14px; }
        .side-btns { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; }
        .sq-btn { width: 65px; height: 65px; background: #333; border: 2px solid #555; border-radius: 12px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 4px 0 #111; }
        .skin { font-size: 70px; text-align: center; margin-top: 90px; line-height: 1; }
        .bottom-row { position: absolute; bottom: 15px; width: 92%; display: flex; gap: 10px; justify-content: center; }
        .m-select { flex: 1; background: #0055ff; padding: 16px; border-radius: 35px; border: 3px solid #fff; font-weight: bold; text-align: center; font-size: 13px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 0 #002266; }
        .play { flex: 1.2; background: #ffea00; color: #000; padding: 16px; border-radius: 35px; border: 3px solid #fff; font-weight: bold; font-size: 20px; text-align: center; box-shadow: 0 5px 0 #998800; }
        .mdl { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 2px solid #0055ff; width: 85%; border-radius: 20px; padding: 20px; display: none; z-index: 100; overflow-y: auto; max-height: 80%; }
        .act { border: 1px solid gold; padding: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="nick-sc" class="sc" style="display:flex">
        <div class="n-box">
            <h2 style="margin:0; text-align:center">pico id</h2>
            <input type="text" id="nick-in" placeholder="введи ник">
            <button onclick="saveNick()" style="padding:12px; background:#0f0; border:none; font-weight:bold; border-radius:8px; color:#000">вход</button>
        </div>
    </div>

    <div id="match-sc" class="sc">
        <div class="m-sun"></div>
        <div class="m-title">подбор игроков...</div>
        <div class="m-count">найдено игроков <span id="p-found">0</span> из 10</div>
        <div class="m-char">😼⚽</div>
    </div>

    <div id="game-sc" class="sc">
        <div class="hud"><div class="hp-w"><div id="hp-f"></div></div><div id="ammo" style="color:#ff0; font-weight:bold; margin-top:5px;">3 / 3</div></div>
        <canvas id="stage"></canvas>
        <div id="j-l" class="j"><div id="s-l" class="st"></div></div>
        <div id="j-r" class="j"><div id="s-r" class="st"></div></div>
    </div>

    <div id="menu-sc" class="sc">
        <img src="https://i.ibb.co/DJsfqdJ/IMG-1949.jpg" class="bg">
        <div class="top">
            <div class="p-card" id="disp-nick">pico</div>
            <div class="stats">
                <div class="s-item">🟡 <span id="c-count">100</span></div>
                <div class="s-item">💎 <span id="g-count">20</span></div>
                <div class="s-item">🍿 <span id="p-count">0</span></div>
            </div>
        </div>
        <div class="side-btns">
            <div class="sq-btn" onclick="openM('shop-mdl')">магазин</div>
        </div>
        <div class="skin">😀<br>🚹<br>🦵🏾🦵🏾</div>
        <div class="bottom-row">
            <div class="m-select" onclick="openM('mode-mdl')"><span id="mode-tx">одиночное</span></div>
            <div class="play" onclick="startMatching()">играть</div>
        </div>
    </div>

    <div id="shop-mdl" class="mdl">
        <h3 style="color:gold; text-align:center">магазин</h3>
        <button id="daily-btn" onclick="claimDaily()" style="width:100%; background:#0f0; border:none; padding:10px; border-radius:10px; font-weight:bold; margin-bottom:15px;">🎁 забрать награду</button>
        <div class="act"><span>10 💎 за 20 🟡</span><button onclick="buy(10,'g',20,'c')" style="background:gold; border:none; padding:5px; border-radius:5px;">купить</button></div>
        <div class="act"><span>скорость x2 (100 🍿)</span><button onclick="buyPop(100,'speed')" style="background:#ffea00; border:none; padding:5px; border-radius:5px;">купить</button></div>
        <button onclick="closeM()" style="width:100%; padding:10px; border-radius:10px;">закрыть</button>
    </div>

    <div id="mode-mdl" class="mdl">
        <div onclick="setM('одиночное')" style="padding:15px">одиночное</div>
        <div onclick="setM('парное')" style="padding:15px">парное</div>
        <button onclick="closeM()" style="width:100%; padding:10px; border-radius:10px;">отмена</button>
    </div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAqVnAGWpLJKWYoyMoqdyVg22Ks4U2Bq-0",
    projectId: "pico-server-pro",
    databaseURL: "https://pico-server-pro-default-rtdb.firebaseio.com",
    appId: "1:1066461989698:ios:58db1a5166b9c6dd9416db"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const canvas = document.getElementById('stage'), ctx = canvas.getContext('2d');
let w, h, playing = 0, ammo = 3, coins = 100, gems = 20, popcorn = 0;
let plr = {x:0, y:0, speed: 4.5, hp: 100, nick: "pico"};
let bots = [], bullets = [], currentMode = "одиночное";
let ml = {a:0,x:0,y:0}, mr = {a:0,ang:0};

function saveStats() {
    localStorage.setItem('pico_coins', coins);
    localStorage.setItem('pico_gems', gems);
    localStorage.setItem('pico_popcorn', popcorn);
    refresh();
}

function loadStats() {
    coins = parseInt(localStorage.getItem('pico_coins')) || 100;
    gems = parseInt(localStorage.getItem('pico_gems')) || 20;
    popcorn = parseInt(localStorage.getItem('pico_popcorn')) || 0;
    refresh();
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.onresize = resize; resize();

function saveNick() {
    const n = document.getElementById('nick-in').value || "pico";
    plr.nick = n;
    localStorage.setItem('pico_nick', n);
    document.getElementById('disp-nick').innerText = n;
    document.getElementById('nick-sc').style.display = 'none';
    document.getElementById('menu-sc').style.display = 'flex';
    loadStats();
}

function startMatching() {
    document.getElementById('menu-sc').style.display = 'none';
    document.getElementById('match-sc').style.display = 'flex';
    
    const myNick = plr.nick;
    const queueRef = db.ref('matchmaking/queue/' + myNick);
    
    queueRef.set({
        nick: myNick,
        joinedAt: Date.now()
    });

    db.ref('matchmaking/queue').on('value', (snapshot) => {
        const players = snapshot.val() || {};
        const count = Object.keys(players).length;
        
        document.getElementById('p-found').innerText = count;

        if (count >= 10) {
            db.ref('matchmaking/queue').off(); 
            queueRef.remove(); 
            goBattle(players); 
        }
    });

    window.onbeforeunload = () => queueRef.remove();
}

function goBattle(playersData) {
    bots = []; 
    bullets = [];
    const playerList = Object.keys(playersData);

    for(let i = 0; i < 9; i++) {
        let enemyNick = playerList[i + 1] || "bot_" + i; 
        bots.push({
            x: Math.random() * w, 
            y: Math.random() * h, 
            hp: 100, 
            nick: enemyNick, 
            team: (currentMode === "одиночное" ? i + 1 : (i < 1 ? 0 : i + 1))
        });
    }
    
    document.querySelectorAll('.sc').forEach(s => s.style.display = 'none');
    document.getElementById('game-sc').style.display = 'flex';
    plr.x = w/2; plr.y = h/2; playing = 1;
}

function loop() {
    if(playing) {
        ctx.fillStyle = "#151515"; ctx.fillRect(0,0,w,h);
        if(ml.a) { plr.x += ml.x * plr.speed; plr.y += ml.y * plr.speed; }
        
        if(mr.a) {
            ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.beginPath(); ctx.moveTo(plr.x, plr.y);
            ctx.lineTo(plr.x + Math.cos(mr.ang)*100, plr.y + Math.sin(mr.ang)*100); ctx.stroke();
        }

        bots.forEach((b, bi) => {
            if(b.hp > 0) {
                ctx.fillStyle = b.team === 0 ? "#0af" : "#f33";
                ctx.beginPath(); ctx.arc(b.x, b.y, 18, 0, 7); ctx.fill();
                ctx.fillStyle = "#fff"; ctx.fillText(b.nick, b.x, b.y-25);
                
                bullets.forEach((bull, bui) => {
                    let d = Math.hypot(bull.x - b.x, bull.y - b.y);
                    if(d < 20) { b.hp -= 50; bullets.splice(bui, 1); }
                });
            }
        });

        bullets.forEach((bull, i) => {
            bull.x += Math.cos(bull.ang)*10; bull.y += Math.sin(bull.ang)*10;
            ctx.fillStyle = "#ff0"; ctx.beginPath(); ctx.arc(bull.x, bull.y, 5, 0, 7); ctx.fill();
            if(bull.x < 0 || bull.x > w || bull.y < 0 || bull.y > h) bullets.splice(i, 1);
        });

        ctx.fillStyle = "#3f3"; ctx.beginPath(); ctx.arc(plr.x, plr.y, 18, 0, 7); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.fillText(plr.nick, plr.x, plr.y-25);

        if(bots.every(b => b.hp <= 0 || b.team === 0)) {
            playing = 0; coins += 100; saveStats();
            alert("победа!"); location.reload();
        }
    }
    requestAnimationFrame(loop);
}
loop();

function fire() {
    if(ammo > 0) {
        bullets.push({x: plr.x, y: plr.y, ang: mr.ang});
        ammo--; refresh();
        if(ammo === 0) setTimeout(() => { ammo = 3; refresh(); }, 2000);
    }
}

function buy(p, tP, am, tG) {
    if(coins >= am) { coins -= am; gems += p; saveStats(); alert("куплено!"); }
}

function buyPop(cost, type) {
    if(popcorn >= cost) { 
        popcorn -= cost; 
        if(type === 'speed') plr.speed *= 2; 
        saveStats(); 
    }
}

function claimDaily() { popcorn += 50; saveStats(); alert("получено 50 попкорна!"); }

function refresh() {
    document.getElementById('ammo').innerText = ammo + " / 3";
    document.getElementById('c-count').innerText = coins;
    document.getElementById('g-count').innerText = gems;
    document.getElementById('p-count').innerText = popcorn;
}

function openM(id) { document.getElementById(id).style.display = 'block'; }
function closeM() { document.querySelectorAll('.mdl').forEach(m => m.style.display = 'none'); }
function setM(n) { currentMode = n; document.getElementById('mode-tx').innerText = n; closeM(); }

function handle(e, j, zId, sId, shoot) {
    const z = document.getElementById(zId).getBoundingClientRect();
    const s = document.getElementById(sId);
    const t = Array.from(e.touches).find(t => t.clientX > z.left-20 && t.clientX < z.right+20);
    if(t) {
        j.a = 1; let dx = t.clientX - (z.left+40), dy = t.clientY - (z.top+40);
        let d = Math.min(Math.hypot(dx,dy), 35); j.ang = Math.atan2(dy, dx);
        if(!shoot) { j.x = Math.cos(j.ang)*(d/35); j.y = Math.sin(j.ang)*(d/35); }
        s.style.transform = `translate(calc(-50% + ${Math.cos(j.ang)*d}px), calc(-50% + ${Math.sin(j.ang)*d}px))`;
    }
}

window.addEventListener('touchstart', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchmove', e => { handle(e,ml,'j-l','s-l',0); handle(e,mr,'j-r','s-r',1); });
window.addEventListener('touchend', e => {
    if(e.touches.length === 0) {
        if(mr.a) fire();
        ml.a = 0; mr.a = 0;
        document.getElementById('s-l').style.transform = 'translate(-50%,-50%)';
        document.getElementById('s-r').style.transform = 'translate(-50%,-50%)';
    }
});

// скрипт для удержания pwa внутри приложения на ios
(function(a, b, c) {
    if (c in b && b[c]) {
        var d, e = a.location,
            f = /^(a|html)$/i;
        a.addEventListener("click", function(a) {
            d = a.target;
            while (!f.test(d.nodeName)) d = d.parentNode;
            "href" in d && (d.href.indexOf("http") || ~d.href.indexOf(e.host)) && (a.preventDefault(), e.href = d.href)
        }, !1)
    }
})(document, window.navigator, "standalone");

loadStats();
</script>
</body>
</html>
